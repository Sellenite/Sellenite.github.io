</div><div class="line">447</div><div class="line">448</div><div class="line">449</div><div class="line">450</div><div class="line">451</div><div class="line">452</div><div class="line">453</div><div class="line">454</div><div class="line">455</div><div class="line">456</div><div class="line">457</div><div class="line">458</div><div class="line">459</div><div class="line">460</div><div class="line">461</div><div class="line">462</div><div class="line">463</div><div class="line">464</div><div class="line">465</div><div class="line">466</div><div class="line">467</div><div class="line">468</div><div class="line">469</div><div class="line">470</div><div class="line">471</div><div class="line">472</div><div class="line">473</div><div class="line">474</div><div class="line">475</div><div class="line">476</div><div class="line">477</div><div class="line">478</div><div class="line">479</div><div class="line">480</div><div class="line">481</div><div class="line">482</div><div class="line">483</div><div class="line">484</div><div class="line">485</div><div class="line">486</div><div class="line">487</div><div class="line">488</div><div class="line">489</div><div class="line">490</div><div class="line">491</div><div class="line">492</div><div class="line">493</div><div class="line">494</div><div class="line">495</div><div class="line">496</div><div class="line">497</div></pre></td><td class="code"><pre><div class="line"><span class="comment">/**</span></div><div class="line"> * 你不知道的JavaScript(下卷) 第二部分 ES6及更新版本</div><div class="line"> * 第一部分没有笔记</div><div class="line"> */</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> runSomething = <span class="function">(<span class="params">obj</span>) =&gt;</span> &#123;</div><div class="line">        <span class="keyword">let</span> x = <span class="built_in">Math</span>.random(),</div><div class="line">            y = <span class="built_in">Math</span>.random();</div><div class="line"></div><div class="line">        <span class="keyword">return</span> obj.something(x, y);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> num = runSomething(&#123;</div><div class="line">        <span class="comment">// 递归引用当前函数的必要写法</span></div><div class="line">        something: <span class="function"><span class="keyword">function</span> <span class="title">something</span>(<span class="params">x, y</span>) </span>&#123;</div><div class="line">            <span class="keyword">if</span> (x &gt; y) &#123;</div><div class="line">                <span class="keyword">return</span> something(y, x);</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">return</span> y - x;</div><div class="line">        &#125;</div><div class="line">    &#125;);</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(num);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> obj1 = &#123;</div><div class="line">        foo() &#123;</div><div class="line">            <span class="built_in">console</span>.log(<span class="string">'foo obj1'</span>);</div><div class="line">        &#125;</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> obj2 = &#123;</div><div class="line">        foo() &#123;</div><div class="line">            <span class="comment">// 可以这样使用super</span></div><div class="line">            <span class="keyword">super</span>.foo();</div><div class="line">            <span class="built_in">console</span>.log(<span class="string">'foo obj2'</span>);</div><div class="line">        &#125;</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="comment">// 其实就是将obj1的__proto__赋值给obj2</span></div><div class="line">    <span class="built_in">Object</span>.setPrototypeOf(obj2, obj1);</div><div class="line">    obj2.foo();</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 标签字符串字面量</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function">(<span class="params">strings, ...values</span>) =&gt;</span> &#123;</div><div class="line">        <span class="built_in">console</span>.log(strings);</div><div class="line">        <span class="built_in">console</span>.log(values);</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> desc = <span class="string">'awesome'</span>;</div><div class="line"></div><div class="line">    foo<span class="string">`Everything is <span class="subst">$&#123;desc&#125;</span>!`</span>;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 标签字符串字面量简单应用</span></div><div class="line">    <span class="keyword">const</span> fixNum = <span class="function">(<span class="params">strings, ...values</span>) =&gt;</span> &#123;</div><div class="line">        <span class="comment">// strings ["you should pay ", " to me"]</span></div><div class="line">        <span class="comment">// values [19.9891]</span></div><div class="line">        <span class="keyword">return</span> strings.reduce(<span class="function">(<span class="params">prev, curr, currIdx</span>) =&gt;</span> &#123;</div><div class="line">            <span class="built_in">console</span>.log(prev);</div><div class="line">            <span class="built_in">console</span>.log(curr);</div><div class="line">            <span class="keyword">if</span> (currIdx &gt; <span class="number">0</span>) &#123;</div><div class="line">                <span class="keyword">if</span> (<span class="keyword">typeof</span> values[currIdx - <span class="number">1</span>] === <span class="string">'number'</span>) &#123;</div><div class="line">                    prev += <span class="string">`$<span class="subst">$&#123;values[currIdx - <span class="number">1</span>].toFixed(<span class="number">2</span>)&#125;</span>`</span></div><div class="line">                &#125;</div><div class="line">                <span class="keyword">else</span> &#123;</div><div class="line">                    prev += values[currIdx - <span class="number">1</span>];</div><div class="line">                &#125;</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">return</span> prev + curr;</div><div class="line">        &#125;, <span class="string">""</span>);</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> amt = <span class="number">19.9891</span>;</div><div class="line">    <span class="comment">// 每个通过字面量传入的数字都会被toFixed</span></div><div class="line">    <span class="keyword">const</span> result = fixNum<span class="string">`you should pay <span class="subst">$&#123;amt&#125;</span> to me`</span>;</div><div class="line">    <span class="built_in">console</span>.log(result);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 箭头函数没有自己的arguments，而是继承自父层</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">const</span> bar = <span class="function"><span class="params">()</span> =&gt;</span> &#123;</div><div class="line">            <span class="built_in">console</span>.log(<span class="built_in">arguments</span>); <span class="comment">// Arguments [1, 2, 3, callee:(..)]</span></div><div class="line">        &#125;;</div><div class="line">        bar(<span class="number">4</span>, <span class="number">5</span>, <span class="number">6</span>);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    foo(<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>);</div><div class="line"></div><div class="line">    <span class="comment">// 但是仍然像普通函数一样可以通过结构来得到类似arguments的数组</span></div><div class="line">    <span class="keyword">const</span> baz = <span class="function">(<span class="params">...args</span>) =&gt;</span> &#123;</div><div class="line">        <span class="built_in">console</span>.log(args);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    baz(<span class="number">7</span>, <span class="number">8</span>, <span class="number">9</span>); <span class="comment">// [7, 8, 9]</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 箭头函数内部没有constructor方法，也没有prototype，所以不支持new操作</span></div><div class="line">    <span class="comment">// 它对this的处理与一般的普通函数不一样，箭头函数的this始终指向函数定义时的this，不可用于构造</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="params">()</span> =&gt;</span> &#123; &#125;;</div><div class="line">    <span class="keyword">const</span> bar = <span class="keyword">new</span> foo(); <span class="comment">// 不要使用箭头函数做为构造函数</span></div><div class="line">&#125;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// symbol没有字面量形式，不能对Symbol使用new，他不是一个构造器，也不会创建对象</span></div><div class="line">    <span class="keyword">const</span> sym = <span class="built_in">Symbol</span>(<span class="string">'some optional description'</span>);</div><div class="line">    <span class="comment">// 基础类型，识别symbol的首选办法</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="keyword">typeof</span> sym); <span class="comment">// symbol</span></div><div class="line">    <span class="comment">// 提供描述时会只被作为这个符号的字符串表示</span></div><div class="line">    <span class="built_in">console</span>.log(sym.toString()); <span class="comment">// Symbol(some optional description)</span></div><div class="line"></div><div class="line">    <span class="comment">// sym不是Symbol的实例，像字符串不是String的实例一样，所以无法使用instanceof判断，需要装箱</span></div><div class="line">    <span class="built_in">console</span>.log(sym <span class="keyword">instanceof</span> <span class="built_in">Symbol</span>); <span class="comment">// false</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>(sym) <span class="keyword">instanceof</span> <span class="built_in">Symbol</span>); <span class="comment">// true</span></div><div class="line">    <span class="comment">// 平时判断直接使用typeof判断即可，无需再次装箱再判断</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 单例creator</span></div><div class="line">    <span class="keyword">const</span> getSingle = <span class="function"><span class="keyword">function</span>(<span class="params">fn</span>) </span>&#123;</div><div class="line">        <span class="comment">// 符号本身的内部值是不在代码中出现且无法获得的，所以可以作为唯一值</span></div><div class="line">        <span class="keyword">const</span> INSTANCE = <span class="built_in">Symbol</span>(<span class="string">'instance'</span>);</div><div class="line">        <span class="comment">// 将返回的结果绑定creator的执行环境this</span></div><div class="line">        <span class="keyword">const</span> _this = <span class="keyword">this</span>;</div><div class="line"></div><div class="line">        <span class="keyword">return</span> <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="keyword">return</span> getSingle[INSTANCE] || (getSingle[INSTANCE] = fn.apply(_this, <span class="built_in">arguments</span>));</div><div class="line">        &#125;</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="comment">// 执行环境</span></div><div class="line">    <span class="keyword">const</span> container = &#123;</div><div class="line">        getSingle</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> creator = container.getSingle(<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123; <span class="keyword">return</span> <span class="keyword">this</span> &#125;);</div><div class="line">    <span class="keyword">const</span> result1 = creator();</div><div class="line">    <span class="keyword">const</span> result2 = creator();</div><div class="line">    <span class="built_in">console</span>.log(result1); <span class="comment">// container</span></div><div class="line">    <span class="built_in">console</span>.log(result1 === result2); <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 符号作为键值存在于对象中时，不可被枚举，但可以被Object.getOwnPropertySymbols拿出</span></div><div class="line">    <span class="keyword">const</span> obj = &#123;</div><div class="line">        <span class="attr">foo</span>: <span class="number">42</span>,</div><div class="line">        [<span class="built_in">Symbol</span>(<span class="string">'foo'</span>)]: <span class="number">24</span>,</div><div class="line">        <span class="attr">bar</span>: <span class="number">110</span></div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.getOwnPropertyNames(obj)); <span class="comment">// ["foo", "bar"]</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.getOwnPropertySymbols(obj)); <span class="comment">// [Symbol(foo)]</span></div><div class="line"></div><div class="line">    <span class="comment">// 内置符号</span></div><div class="line">    <span class="keyword">const</span> arr = [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>];</div><div class="line">    <span class="built_in">console</span>.log(arr[<span class="built_in">Symbol</span>.iterator]); <span class="comment">// ƒ values() &#123; [native code] &#125;</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> arr = [&#123; <span class="attr">a</span>: <span class="number">1</span>, <span class="attr">b</span>: <span class="number">2</span> &#125;, <span class="number">2</span>, <span class="number">3</span>];</div><div class="line">    <span class="keyword">const</span> it = arr[<span class="built_in">Symbol</span>.iterator]();</div><div class="line"></div><div class="line">    <span class="keyword">const</span> map = <span class="keyword">new</span> <span class="built_in">Map</span>();</div><div class="line">    map.set(<span class="string">'a'</span>, <span class="number">4</span>);</div><div class="line">    map.set(<span class="string">'b'</span>, <span class="number">5</span>);</div><div class="line"></div><div class="line">    <span class="keyword">const</span> it2 = map.entries();</div><div class="line"></div><div class="line">    <span class="comment">// 返回最终值，例如前面的arr的3，done依然是false的，再进行一次迭代done才是true</span></div><div class="line">    <span class="built_in">console</span>.log(it.next());</div><div class="line">    <span class="built_in">console</span>.log(it2.next());</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> arr = [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>];</div><div class="line">    <span class="keyword">const</span> it = arr[<span class="built_in">Symbol</span>.iterator]();</div><div class="line">    <span class="comment">/**</span></div><div class="line">     * for-of实现原理</div><div class="line">     * 迭代之前都调用了 it.next()，然后查看一下 res.done，</div><div class="line">     * 如果 res.done 为 true，表达式求值为 false，迭代就不会发生，</div><div class="line">     * 这就是返回最后一个值时，返回的done仍然是true的原因，否则就直接忽略最后一个值了</div><div class="line">     */</div><div class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> v, res; (res = it.next()) &amp;&amp; !res.done;) &#123;</div><div class="line">        v = res.value;</div><div class="line">        <span class="built_in">console</span>.log(v);</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> task = &#123;</div><div class="line">        <span class="attr">actions</span>: [],</div><div class="line">        [<span class="built_in">Symbol</span>.iterator]() &#123;</div><div class="line">            <span class="keyword">let</span> steps = <span class="keyword">this</span>.actions.slice();</div><div class="line"></div><div class="line">            <span class="keyword">return</span> &#123;</div><div class="line">                <span class="comment">// 使迭代器成为iterable</span></div><div class="line">                [<span class="built_in">Symbol</span>.iterator]() &#123; <span class="keyword">return</span> <span class="keyword">this</span> &#125;,</div><div class="line">                next(...args) &#123;</div><div class="line">                    <span class="keyword">if</span> (steps.length &gt; <span class="number">0</span>) &#123;</div><div class="line">                        <span class="keyword">let</span> res = steps.shift()(...args);</div><div class="line">                        <span class="keyword">return</span> &#123; <span class="attr">value</span>: res, <span class="attr">done</span>: <span class="literal">false</span> &#125;;</div><div class="line">                    &#125; <span class="keyword">else</span> &#123;</div><div class="line">                        <span class="keyword">return</span> &#123; <span class="attr">value</span>: <span class="literal">undefined</span>, <span class="attr">done</span>: <span class="literal">true</span> &#125;;</div><div class="line">                    &#125;</div><div class="line">                &#125;,</div><div class="line"></div><div class="line">                <span class="keyword">return</span>(v) &#123;</div><div class="line">                    steps.length = <span class="number">0</span>;</div><div class="line">                    <span class="keyword">return</span> &#123; <span class="attr">value</span>: v, <span class="attr">done</span>: <span class="literal">true</span> &#125;;</div><div class="line">                &#125;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    task.actions.push(<span class="function"><span class="keyword">function</span>(<span class="params">x, y</span>) </span>&#123;</div><div class="line">        <span class="keyword">return</span> x + y;</div><div class="line">    &#125;);</div><div class="line"></div><div class="line">    <span class="keyword">let</span> it = task[<span class="built_in">Symbol</span>.iterator]();</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(it.next(<span class="number">10</span>, <span class="number">20</span>));</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// iterator返回的value是yield后面的值</span></div><div class="line">    <span class="comment">// 每次next都会停在yield的左边，并把yield的内容先返回为value</span></div><div class="line">    <span class="comment">// 使用next赋值可以用作里面表达式的值进行运算</span></div><div class="line">    <span class="comment">// next总比yield多一</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">yield</span> <span class="number">1</span>;</div><div class="line">        <span class="keyword">const</span> num = <span class="number">100</span> * (<span class="keyword">yield</span> <span class="number">2</span>);</div><div class="line">        <span class="keyword">return</span> num;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> it = foo();</div><div class="line">    <span class="built_in">console</span>.log(it.next(<span class="string">'111'</span>));</div><div class="line">    <span class="built_in">console</span>.log(it.next(<span class="string">'222'</span>));</div><div class="line">    <span class="built_in">console</span>.log(it.next(<span class="string">'333'</span>)); <span class="comment">// 333000, done</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// Regenerator原理，ES5</span></div><div class="line">    <span class="comment">// 原来的写法：</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">const</span> x = <span class="keyword">yield</span> <span class="number">42</span>;</div><div class="line">        <span class="built_in">console</span>.log(x);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> it = foo();</div><div class="line">    <span class="built_in">console</span>.log(it.next());</div><div class="line">    <span class="built_in">console</span>.log(it.next(<span class="string">'111'</span>));</div><div class="line"></div><div class="line">    <span class="comment">// facebook Regenerator 实现iterator大概原理：</span></div><div class="line">    <span class="keyword">const</span> bar = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> state = <span class="number">0</span>, x;</div><div class="line"></div><div class="line">        <span class="function"><span class="keyword">function</span> <span class="title">nextState</span>(<span class="params">v</span>) </span>&#123;</div><div class="line">            <span class="keyword">switch</span> (state) &#123;</div><div class="line">                <span class="keyword">case</span> <span class="number">0</span>:</div><div class="line">                    state++;</div><div class="line">                    <span class="keyword">return</span> <span class="number">42</span>;</div><div class="line">                <span class="keyword">case</span> <span class="number">1</span>:</div><div class="line">                    state++;</div><div class="line">                    x = v;</div><div class="line">                    <span class="built_in">console</span>.log(x);</div><div class="line">                    <span class="keyword">return</span> <span class="literal">undefined</span>;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        <span class="keyword">return</span> &#123;</div><div class="line">            <span class="attr">next</span>: <span class="function"><span class="keyword">function</span>(<span class="params">v</span>) </span>&#123;</div><div class="line">                <span class="keyword">let</span> ret = nextState(v);</div><div class="line">                <span class="keyword">return</span> &#123; <span class="attr">value</span>: ret, <span class="attr">done</span>: state === <span class="number">2</span> &#125;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="comment">// 与原生的iterator同样用法</span></div><div class="line">    <span class="keyword">const</span> it2 = bar();</div><div class="line">    <span class="built_in">console</span>.log(it2.next());</div><div class="line">    <span class="built_in">console</span>.log(it2.next(<span class="string">'222'</span>));</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">Foo</span> </span>&#123;</div><div class="line">        <span class="keyword">constructor</span>(a, b) &#123;</div><div class="line">            <span class="keyword">this</span>.x = a;</div><div class="line">            <span class="keyword">this</span>.y = b;</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        getValueXY() &#123;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">this</span>.x * <span class="keyword">this</span>.y;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">Bar</span> <span class="keyword">extends</span> <span class="title">Foo</span> </span>&#123;</div><div class="line">        <span class="keyword">constructor</span>(a, b, c) &#123;</div><div class="line">            <span class="keyword">super</span>(a, b);</div><div class="line">            <span class="keyword">this</span>.z = c;</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        getValueXYZ() &#123;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">super</span>.getValueXY() * <span class="keyword">this</span>.z;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> bar = <span class="keyword">new</span> Bar(<span class="number">5</span>, <span class="number">10</span>, <span class="number">15</span>);</div><div class="line">    <span class="built_in">console</span>.log(bar);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 对于map来说，通常会使用对象作为键值，因为普通对象本来就能够使用字符串</span></div><div class="line">    <span class="keyword">let</span> x = &#123; <span class="attr">id</span>: <span class="number">1</span> &#125;;</div><div class="line">    <span class="keyword">let</span> y = &#123; <span class="attr">id</span>: <span class="number">2</span> &#125;;</div><div class="line">    <span class="keyword">let</span> map = <span class="keyword">new</span> <span class="built_in">Map</span>();</div><div class="line">    map.set(x, <span class="number">1</span>);</div><div class="line">    map.set(y, <span class="number">2</span>);</div><div class="line"></div><div class="line">    <span class="comment">// map的keys()，values()，entries()得到的全是iterator，可以使用...进行扩展</span></div><div class="line">    <span class="keyword">const</span> itValues = map.values();</div><div class="line">    <span class="comment">// 方法从一个类似数组或可迭代对象中创建一个新的数组实例，有第二个回调参数</span></div><div class="line">    <span class="keyword">const</span> arr1 = <span class="built_in">Array</span>.from(itValues); <span class="comment">// [1, 2]</span></div><div class="line">    <span class="comment">// 也可以通过扩展运算符处理iterator</span></div><div class="line">    <span class="keyword">const</span> arr2 = [...itValues]; <span class="comment">// []，arr1已经将iterator迭代完毕</span></div><div class="line">    <span class="built_in">console</span>.log(arr1, arr2, itValues);</div><div class="line"></div><div class="line">    <span class="keyword">const</span> itKeys = map.keys();</div><div class="line">    <span class="keyword">const</span> arr3 = [...itKeys]; <span class="comment">// [&#123;id: 1&#125;, &#123;id: 2&#125;]</span></div><div class="line">    <span class="built_in">console</span>.log(arr3);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// new Array时传入一个数字参数时是生成一个空数组，其length 属性为这个数字</span></div><div class="line">    <span class="comment">// Array.of(..)可以修复这个问题</span></div><div class="line">    <span class="keyword">const</span> arrEmpty = <span class="keyword">new</span> <span class="built_in">Array</span>(<span class="number">3</span>);</div><div class="line">    <span class="built_in">console</span>.log(arrEmpty);</div><div class="line"></div><div class="line">    <span class="keyword">const</span> arrExist = <span class="built_in">Array</span>.of(<span class="number">3</span>);</div><div class="line">    <span class="built_in">console</span>.log(arrExist);</div><div class="line"></div><div class="line">    <span class="comment">// babel默认不支持原生构造函数的继承，需要插件支持，不然执行会找不到方法</span></div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">AnotherArray</span> <span class="keyword">extends</span> <span class="title">Array</span> </span>&#123;</div><div class="line">        sum() &#123;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">this</span>.reduce(<span class="function">(<span class="params">prev, curr, currIdx</span>) =&gt;</span> &#123;</div><div class="line">                <span class="keyword">return</span> prev + curr;</div><div class="line">            &#125;, <span class="number">0</span>);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> arr = AnotherArray.of(<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>);</div><div class="line">    <span class="built_in">console</span>.log(arr.sum());</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// Array.from可以将iterator转成数组（看上面例子）</span></div><div class="line">    <span class="comment">// 如果把类数组对象作为参数传给Array.from，它的行为方式和slice()或者apply(..)是一样的</span></div><div class="line">    <span class="keyword">const</span> arr = [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>];</div><div class="line">    <span class="keyword">const</span> arrCopy = <span class="built_in">Array</span>.from(arr);</div><div class="line">    arrCopy[<span class="number">1</span>] = <span class="number">4</span>;</div><div class="line">    <span class="built_in">console</span>.log(arr, arrCopy);</div><div class="line"></div><div class="line">    <span class="comment">// Array.from转换的数组没有空槽位，是真正的undefined值，new Array(4)就有4个空槽位</span></div><div class="line">    <span class="keyword">const</span> arrEmpty = <span class="keyword">new</span> <span class="built_in">Array</span>(<span class="number">4</span>);</div><div class="line">    <span class="keyword">const</span> arrUndefined = <span class="built_in">Array</span>.from(arrEmpty);</div><div class="line">    <span class="built_in">console</span>.log(arrEmpty, arrUndefined);</div><div class="line"></div><div class="line">    <span class="comment">// Array.from的第二个参数，映射功能，与Array#map的功能相似</span></div><div class="line">    <span class="keyword">const</span> arrCopyMap = <span class="built_in">Array</span>.from(arr, (item, index) =&gt; &#123;</div><div class="line">        <span class="keyword">if</span> (item % <span class="number">2</span> === <span class="number">1</span>) &#123;</div><div class="line">            <span class="keyword">return</span> item * <span class="number">2</span>;</div><div class="line">        &#125; <span class="keyword">else</span> &#123;</div><div class="line">            <span class="keyword">return</span> item;</div><div class="line">        &#125;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(arrCopyMap);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/**</span></div><div class="line">     * copyWithin，</div><div class="line">     * 参数是 target（要复制到的索引）</div><div class="line">     * start（开始复制的源索引，包括在内）</div><div class="line">     * end（复制结束的不包含索引）</div><div class="line">     * 任何一个参数是负数，就被当作是相对于数组结束的相对值</div><div class="line">     * 会修改原数组</div><div class="line">     */</div><div class="line">    <span class="keyword">const</span> arr = [<span class="number">0</span>, <span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span>];</div><div class="line">    <span class="built_in">console</span>.log(arr.copyWithin(<span class="number">3</span>, <span class="number">0</span>, <span class="number">1</span>)); <span class="comment">// [0, 1, 2, 0, 4]</span></div><div class="line">    [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span>, <span class="number">5</span>].copyWithin(<span class="number">2</span>, <span class="number">1</span>); <span class="comment">// 结果是[1, 2, 2, 3, 4]，而不是[1, 2, 2, 2, 2]</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> arrEmpty = <span class="keyword">new</span> <span class="built_in">Array</span>(<span class="number">4</span>);</div><div class="line">    arrEmpty.fill(<span class="string">'all'</span>);</div><div class="line">    <span class="keyword">const</span> arrUndefined = <span class="built_in">Array</span>.from(<span class="keyword">new</span> <span class="built_in">Array</span>(<span class="number">4</span>));</div><div class="line">    arrUndefined.fill(<span class="string">'part'</span>, <span class="number">1</span>, <span class="number">3</span>);</div><div class="line">    <span class="built_in">console</span>.log(arrEmpty, arrUndefined);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// some返回的是true/false</span></div><div class="line">    <span class="keyword">const</span> arr = [<span class="number">1</span>, <span class="number">3</span>, <span class="number">2</span>, <span class="number">4</span>, <span class="number">5</span>];</div><div class="line">    <span class="keyword">const</span> result = arr.some(<span class="function">(<span class="params">item, index, arr</span>) =&gt;</span> &#123;</div><div class="line">        <span class="keyword">return</span> item === index;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(result); <span class="comment">// true</span></div><div class="line"></div><div class="line">    <span class="comment">// find返回的是真正的数组值，找不到返回undefined</span></div><div class="line">    <span class="keyword">const</span> num = arr.find(<span class="function">(<span class="params">item, index</span>) =&gt;</span> &#123;</div><div class="line">        <span class="keyword">return</span> item === index;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(num); <span class="comment">// 2</span></div><div class="line"></div><div class="line">    <span class="comment">// findIndex返回的是数组的索引值，找不到返回-1</span></div><div class="line">    <span class="keyword">const</span> index = arr.findIndex(<span class="function">(<span class="params">item, index</span>) =&gt;</span> &#123;</div><div class="line">        <span class="keyword">return</span> item === <span class="number">5</span>;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(index); <span class="comment">// 4</span></div><div class="line"></div><div class="line">    <span class="comment">// find和findIndex都支持数组值是对象的复杂值</span></div><div class="line">    <span class="keyword">const</span> arrComplex = [</div><div class="line">        &#123; <span class="attr">id</span>: <span class="number">1</span>, <span class="attr">value</span>: <span class="number">100</span> &#125;,</div><div class="line">        &#123; <span class="attr">id</span>: <span class="number">2</span>, <span class="attr">value</span>: <span class="number">200</span> &#125;</div><div class="line">    ];</div><div class="line"></div><div class="line">    <span class="keyword">const</span> obj = arrComplex.find(<span class="function">(<span class="params">item, index</span>) =&gt;</span> &#123;</div><div class="line">        <span class="keyword">return</span> item.id === <span class="number">2</span>;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(obj); <span class="comment">// &#123;id: 2, value: 200&#125;</span></div><div class="line"></div><div class="line">    <span class="keyword">const</span> num2 = arrComplex.findIndex(<span class="function">(<span class="params">item, index</span>) =&gt;</span> &#123;</div><div class="line">        <span class="keyword">return</span> item.value === <span class="number">200</span>;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(num2); <span class="comment">// 1</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// Object.is执行比 === 比较更严格的值比较，具体在于NaN和+0与-0的比较，与===不太相同</span></div><div class="line">    <span class="keyword">const</span> x = <span class="literal">NaN</span>, y = +<span class="number">0</span>, z = <span class="number">-0</span>;</div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.is(x, <span class="literal">NaN</span>)); <span class="comment">// true</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.is(y, z)); <span class="comment">// false</span></div><div class="line"></div><div class="line">    x === <span class="literal">NaN</span>; <span class="comment">// false</span></div><div class="line">    y === z; <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// Number.isNaN()与window.isNaN()不相同，window.isNaN()判断有问题，会将传入的参数先转为数字</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Number</span>.isNaN(<span class="string">'test'</span>)) <span class="comment">// false</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">window</span>.isNaN(<span class="string">'test'</span>)) <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/**</span></div><div class="line">     * new.target能够指向调用new的目标构造器</div><div class="line">     * 在普通的函数调用中（和作为构造函数来调用相对），new.target的值是undefined</div><div class="line">     * 这使得可以检测一个函数是否是作为构造函数通过new被调用的</div><div class="line">     */</div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">Parent</span> </span>&#123;</div><div class="line">        <span class="keyword">constructor</span>() &#123;</div><div class="line">            <span class="keyword">if</span> (<span class="keyword">new</span>.target === Parent) &#123;</div><div class="line">                <span class="comment">// 函数有name属性</span></div><div class="line">                <span class="built_in">console</span>.log(<span class="string">`<span class="subst">$&#123;<span class="keyword">new</span>.target.name&#125;</span> instantiated`</span>);</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                <span class="comment">// 继承时new.target是一个undefined值，可能是继承执行父元素的构造函数时，属于普通调用导致的</span></div><div class="line">                <span class="built_in">console</span>.log(<span class="string">`Child instantiated`</span>);</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">Child</span> <span class="keyword">extends</span> <span class="title">Parent</span> </span>&#123; &#125;;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> parent = <span class="keyword">new</span> Parent();</div><div class="line">    <span class="keyword">const</span> child = <span class="keyword">new</span> Child();</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 定义一个只返回奇数索引值对应的值的迭代器</span></div><div class="line">    <span class="keyword">const</span> arr = [<span class="number">2</span>, <span class="number">4</span>, <span class="number">6</span>, <span class="number">8</span>, <span class="number">10</span>];</div><div class="line">    arr[<span class="built_in">Symbol</span>.iterator] = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> idx = <span class="number">1</span>;</div><div class="line">        <span class="keyword">do</span> &#123;</div><div class="line">            <span class="keyword">yield</span> <span class="keyword">this</span>[idx];</div><div class="line">        &#125; <span class="keyword">while</span> ((idx += <span class="number">2</span>) &lt; <span class="keyword">this</span>.length)</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> v <span class="keyword">of</span> arr) &#123;</div><div class="line">        <span class="built_in">console</span>.log(v);</div><div class="line">    &#125;</div><div class="line">&#125;;</div></pre></td></tr></table></figure>
