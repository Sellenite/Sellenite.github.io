string">'object'</span>); <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 函数对象的length是声明参数的个数 */</span></div><div class="line">    <span class="keyword">let</span> foo = <span class="function"><span class="keyword">function</span> (<span class="params">a, b, c</span>) </span>&#123; &#125;;</div><div class="line">    <span class="built_in">console</span>.log(foo.length); <span class="comment">// 3</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 声明了还没赋值属于undefined */</span></div><div class="line">    <span class="comment">/* 还没声明属于undeclared（javascript还是会打印undefined） */</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* typeof一个var声明了但未定义值的话会打印undefined */</span></div><div class="line">    <span class="comment">/* typeof一个完全没有声明及定义值的话同样也会打印undefined */</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> IIFE = <span class="number">2</span>;</div><div class="line">    <span class="comment">/* typeof判断当前作用域变量是否被定义 */</span></div><div class="line">    <span class="keyword">let</span> helper = (<span class="keyword">typeof</span> IIFE !== <span class="string">'undefined'</span>) ?</div><div class="line">        IIFE :</div><div class="line">        <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="comment">/* somethings */</span></div><div class="line">        &#125;;</div><div class="line">    <span class="comment">/* 使用typeof来检查变量是首选的选择 */</span></div><div class="line">    <span class="built_in">console</span>.log(helper); <span class="comment">// 2</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 用依赖注入设计模式来验证当前作用域变量是否被定义 */</span></div><div class="line">    <span class="keyword">let</span> helper = <span class="function"><span class="keyword">function</span> (<span class="params">IIFE</span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> helper2 = IIFE || <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="comment">/* somethings */</span></div><div class="line">        &#125;;</div><div class="line">    &#125;;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 创建稀疏数组，空白的地方会被显式赋值为undefined */</span></div><div class="line">    <span class="keyword">let</span> arr = [];</div><div class="line">    arr[<span class="number">0</span>] = <span class="number">0</span>;</div><div class="line">    arr[<span class="number">4</span>] = <span class="number">4</span>;</div><div class="line">    <span class="built_in">console</span>.log(arr.length); <span class="comment">// 5</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 数组也是对象，可以包含字符串键值和属性，但不计入于数组的长度 */</span></div><div class="line">    <span class="keyword">let</span> arr = [<span class="number">1</span>, <span class="number">3</span>, <span class="number">5</span>];</div><div class="line">    arr[<span class="string">'name'</span>] = <span class="string">'yuuhei'</span>;</div><div class="line">    arr[<span class="string">'age'</span>] = <span class="number">23</span>;</div><div class="line">    <span class="built_in">console</span>.log(arr, arr.length); <span class="comment">// 3</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 注意，如果字符串键值能够转换为十进制数字，会被当作数字索引处理 */</span></div><div class="line">    <span class="keyword">let</span> arr = [<span class="number">1</span>, <span class="number">3</span>, <span class="number">5</span>];</div><div class="line">    arr[<span class="string">'5'</span>] = <span class="number">100</span>;</div><div class="line">    <span class="built_in">console</span>.log(arr);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 类数组及数组副本建立 */</span></div><div class="line">    <span class="comment">// 类数组转换</span></div><div class="line">    <span class="keyword">let</span> foo = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> arr = <span class="built_in">Array</span>.prototype.slice.call(<span class="built_in">arguments</span>);</div><div class="line">        <span class="built_in">console</span>.log(arr)</div><div class="line">    &#125;</div><div class="line">    foo()</div><div class="line"></div><div class="line">    <span class="comment">// 数组副本</span></div><div class="line">    <span class="keyword">let</span> arr = [<span class="number">1</span>, <span class="number">3</span>, <span class="number">5</span>];</div><div class="line">    <span class="keyword">let</span> arrCopy = <span class="built_in">Array</span>.prototype.slice.call(arr);</div><div class="line">    arr.push(<span class="number">100</span>);</div><div class="line">    arrCopy.push(<span class="number">200</span>);</div><div class="line">    <span class="built_in">console</span>.log(arr, arrCopy);</div><div class="line"></div><div class="line">    <span class="comment">// ES6的Array.from也能够建立副本</span></div><div class="line">    <span class="keyword">let</span> arr2 = [<span class="number">2</span>, <span class="number">4</span>, <span class="number">6</span>];</div><div class="line">    <span class="keyword">let</span> arrCopy2 = <span class="built_in">Array</span>.from(arr2);</div><div class="line">    arr2.push(<span class="number">100</span>);</div><div class="line">    arrCopy2.push(<span class="number">200</span>);</div><div class="line">    <span class="built_in">console</span>.log(arr, arrCopy2);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 访问字符串某个下标应该用.charAt()，老版本IE不允许string[index]这样访问 */</span></div><div class="line">    <span class="comment">/* 以上只能够进行字符串访问，无法进行字符串修改 */</span></div><div class="line">    <span class="keyword">let</span> string = <span class="string">'foo'</span>;</div><div class="line">    <span class="built_in">console</span>.log(string[<span class="number">0</span>]);</div><div class="line">    <span class="built_in">console</span>.log(string.charAt(<span class="number">2</span>));</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 数字值可用指数表示 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="number">5E10</span>;</div><div class="line">    <span class="built_in">console</span>.log(a);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> a = <span class="number">42.59</span>;</div><div class="line">    <span class="comment">/* .toFixed()用于指定小数显示多少个 */</span></div><div class="line">    <span class="built_in">console</span>.log(a.toFixed(<span class="number">4</span>));</div><div class="line">    <span class="comment">/* .toPrecision()用于指定多少个有效数位 */</span></div><div class="line">    <span class="built_in">console</span>.log(a.toPrecision(<span class="number">5</span>));</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* ES6，严格模式不再支持0开头的八进制数 */</span></div><div class="line">    <span class="comment">// let a = 0363;</span></div><div class="line">    <span class="comment">// console.log(a);  SyntaxError</span></div><div class="line"></div><div class="line">    <span class="comment">/* ES6和严格模式下的八进制是用0o前缀表示 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="number">0o363</span>;</div><div class="line">    <span class="built_in">console</span>.log(a); <span class="comment">// 243</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 注意0.1+0.2不等于0.3，存在精度问题 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="number">0.1</span> + <span class="number">0.2</span>;</div><div class="line">    <span class="keyword">let</span> b = <span class="number">0.3</span>;</div><div class="line">    <span class="built_in">console</span>.log(a === b); <span class="comment">// false</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* NaN不与NaN相等，typeof NaN的值为'number' */</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="keyword">typeof</span> <span class="literal">NaN</span>); <span class="comment">// number</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="literal">NaN</span> === <span class="literal">NaN</span>); <span class="comment">// false</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* window有一个全局方法isNaN()，但这个有bug，会将NaN和字符串也会判断为true */</span></div><div class="line">    <span class="comment">/* ES6的Number.isNaN()修复了这个问题，他会先用typeof判断为number再执行此方法</span></div><div class="line">    （上面提到typeof NaN返回的是'number'） */</div><div class="line">    <span class="keyword">let</span> a = <span class="string">'foo'</span>;</div><div class="line">    <span class="keyword">let</span> b = <span class="number">10</span> / <span class="string">'foo'</span>;</div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">window</span>.isNaN(a)); <span class="comment">// true, bug</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">window</span>.isNaN(b)); <span class="comment">// true</span></div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Number</span>.isNaN(a)); <span class="comment">// false，修复了</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Number</span>.isNaN(b)); <span class="comment">// true</span></div><div class="line"></div><div class="line">    <span class="comment">/* 判断是否NaN的更简单方法 */</span></div><div class="line">    <span class="keyword">let</span> IsNaN = <span class="function"><span class="keyword">function</span> (<span class="params">n</span>) </span>&#123;</div><div class="line">        <span class="keyword">return</span> n !== n;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(IsNaN(b)); <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 关于-0，0 === -0是true */</span></div><div class="line">    <span class="comment">/* 使用JSON.stringify()进行数字转为字符串，-号消失；字符串转为数字，-号保留 */</span></div><div class="line">    <span class="comment">/* JSON.stringify(-0) 返回"0"，而JSON.parse("-0") 返回-0 */</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="number">0</span> === <span class="number">-0</span>); <span class="comment">// true</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify(<span class="number">-0</span>), <span class="built_in">JSON</span>.parse(<span class="string">'-0'</span>));</div><div class="line"></div><div class="line">    <span class="comment">/* 判断是否为负0的方法 */</span></div><div class="line">    <span class="keyword">let</span> isMinZero = <span class="function"><span class="keyword">function</span> (<span class="params">n</span>) </span>&#123;</div><div class="line">        n = <span class="built_in">Number</span>(n);</div><div class="line">        <span class="keyword">return</span> (n === <span class="number">0</span>) &amp;&amp; (<span class="number">1</span> / n === -<span class="literal">Infinity</span>);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(isMinZero(<span class="number">-0</span>)); <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 原生函数 */</span></div><div class="line">    <span class="comment">// String()</span></div><div class="line">    <span class="comment">// Number()</span></div><div class="line">    <span class="comment">// Object()</span></div><div class="line">    <span class="comment">// Array()</span></div><div class="line">    <span class="comment">// Boolean()</span></div><div class="line">    <span class="comment">// Function()</span></div><div class="line">    <span class="comment">// RegExp()</span></div><div class="line">    <span class="comment">// Error()</span></div><div class="line">    <span class="comment">// Date()</span></div><div class="line">    <span class="comment">// Symbol()</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* typeof new String('123')会返回object */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="keyword">new</span> <span class="built_in">String</span>(<span class="string">'Hello'</span>);</div><div class="line">    <span class="built_in">console</span>.log(a); <span class="comment">// String &#123;"Hello"&#125;</span></div><div class="line"></div><div class="line">    <span class="comment">/* 使用String.prototype.toString()能够返回string字符串 */</span></div><div class="line">    <span class="built_in">console</span>.log(a.toString()); <span class="comment">// "Hello"</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">String</span>.prototype.toString.call(a)); <span class="comment">// "Hello"</span></div><div class="line"></div><div class="line">    <span class="comment">/* 与本身构造函数的valueOf()功能相同 */</span></div><div class="line">    <span class="built_in">console</span>.log(a.valueOf()); <span class="comment">// "Hello"</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">String</span>.prototype.valueOf.call(a)); <span class="comment">// "Hello"</span></div><div class="line"></div><div class="line">    <span class="comment">/* Object.prototype是不同的 */</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.prototype.toString.call(a)); <span class="comment">// [object String]</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.prototype.valueOf.call(a)); <span class="comment">// String &#123;"Hello"&#125;</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 查看一个内部属性[[class]]使用Object.prototype.toString.call() */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="keyword">new</span> <span class="built_in">Boolean</span>(<span class="literal">false</span>);</div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.prototype.toString.call(a)); <span class="comment">// [object Boolean]</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 想要得到封装对象的基本类型值，可以使用valueOf()函数 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="keyword">new</span> <span class="built_in">String</span>(<span class="string">'Hello'</span>);</div><div class="line">    <span class="built_in">console</span>.log(a.valueOf());</div><div class="line"></div><div class="line">    <span class="comment">/* 隐式拆封 */</span></div><div class="line">    <span class="keyword">let</span> b = a + <span class="string">""</span>;</div><div class="line">    <span class="built_in">console</span>.log(b);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 尝试对一个new String/Boolean/Number进行隐式访问，会造成强制类型转换</span></div><div class="line">       会访问对应的构造函数原型链上的valueOf方法 */</div><div class="line">    <span class="keyword">let</span> string = <span class="keyword">new</span> <span class="built_in">String</span>(<span class="string">'string1'</span>);</div><div class="line">    <span class="comment">// 隐式访问，实际是调用返回了String.prototype.valueOf的值，强制类型转换</span></div><div class="line">    <span class="keyword">if</span> (string.indexOf(<span class="number">1</span>) !== <span class="number">-1</span>) &#123;</div><div class="line">        <span class="built_in">console</span>.log(<span class="string">'new String direct read'</span>);</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 当使用表达式+时，其中一个操作数是string（包含强制转换结果），</span></div><div class="line">       则执行字符串拼接，否则执行数字加法 */</div><div class="line">    <span class="built_in">console</span>.log([] + <span class="number">1</span>); <span class="comment">// []被强制执行.toString，得到空字符，结果为"1"</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="string">"4"</span> + <span class="number">1</span>); <span class="comment">// 41</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 当new Array的时候只传入一个数，</span></div><div class="line">       执行的是创建一个数组，长度为10，且全为空单元（非undefined）填充 */</div><div class="line">    <span class="comment">/* 空单元和undefined是有区别的，注意 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="built_in">Array</span>(<span class="number">10</span>); <span class="comment">// new可以省略，js会自动补加</span></div><div class="line">    <span class="built_in">console</span>.log(a, a.length);</div><div class="line"></div><div class="line">    <span class="comment">/* 清空一个数组可以使用array.length = 0 */</span></div><div class="line">    <span class="keyword">let</span> b = [<span class="number">2</span>, <span class="number">4</span>, <span class="number">6</span>];</div><div class="line">    b.length = <span class="number">0</span>;</div><div class="line">    <span class="built_in">console</span>.log(b);</div><div class="line"></div><div class="line">    <span class="comment">/* 创建一个全是undefined（非空单元）填充的数组 */</span></div><div class="line">    <span class="comment">/* array.length这样强行修改会用空单元填充多余的空位 */</span></div><div class="line">    <span class="keyword">let</span> c = <span class="built_in">Array</span>.apply(<span class="literal">null</span>, &#123; <span class="attr">length</span>: <span class="number">3</span> &#125;);</div><div class="line">    <span class="built_in">console</span>.log(c); <span class="comment">// [undefined, undefined, undefined]</span></div><div class="line"></div><div class="line">    <span class="comment">/* 永远不要创建和使用空单元数组 */</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// String.prototype的各类方法，不修改原字符串</span></div><div class="line">    <span class="comment">// String#.indexOf</span></div><div class="line">    <span class="comment">// String#.charAt</span></div><div class="line">    <span class="comment">// String#.substr String#.substring String#.slice()</span></div><div class="line">    <span class="comment">// String#.toUpperCase String#.toLowerCase()</span></div><div class="line">    <span class="comment">// String#.trim</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* Symbol使用原生构造函数来定义，不用加new */</span></div><div class="line">    <span class="keyword">let</span> myown = <span class="built_in">Symbol</span>(<span class="string">'deleteSomething'</span>);</div><div class="line">    <span class="keyword">let</span> obj = &#123;&#125;;</div><div class="line">    obj[<span class="built_in">Symbol</span>(<span class="string">'deleteSomething'</span>)] = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="comment">/* doSomething */</span></div><div class="line">    &#125;</div><div class="line">    <span class="built_in">console</span>.log(obj);</div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.getOwnPropertySymbols(obj));</div><div class="line"></div><div class="line">    <span class="comment">/* 具有唯一性，很多开发喜欢使用这个用于私有属性代替_function */</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* JSON.stringify()在遇到undefined，function，symbol这三个不安全值时，</span></div><div class="line">       在对象会将其自动忽略，在数组中返回null，在一般调用会返回undefined */</div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify(<span class="literal">undefined</span>)); <span class="comment">// undefined</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify(<span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; &#125;)); <span class="comment">// undefined</span></div><div class="line">    <span class="comment">// "&#123;"a": 2&#125;"</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify(&#123; <span class="attr">a</span>: <span class="number">2</span>, <span class="attr">b</span>: <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; &#125; &#125;));</div><div class="line">    <span class="comment">// "["yuuhei", null, null, 4]"</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify([<span class="string">'yuuhei'</span>, <span class="literal">undefined</span>, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; &#125;, <span class="number">4</span>]));</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* JSON.stringify有一个很实用的replacer，可以对数据进行筛选处理 */</span></div><div class="line">    <span class="comment">// 可以是数组或函数</span></div><div class="line">    <span class="keyword">let</span> obj = &#123;</div><div class="line">        <span class="attr">a</span>: <span class="number">2</span>,</div><div class="line">        <span class="attr">b</span>: <span class="string">"22"</span>,</div><div class="line">        <span class="attr">c</span>: [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>]</div><div class="line">    &#125;</div><div class="line">    <span class="comment">// replacer为数组时的作用</span></div><div class="line">    <span class="keyword">let</span> json1 = <span class="built_in">JSON</span>.stringify(obj, [<span class="string">"a"</span>, <span class="string">"b"</span>]); <span class="comment">// 只序列化key值为a和b的</span></div><div class="line">    <span class="built_in">console</span>.log(json1); <span class="comment">// "&#123;"a":2,"b":"22"&#125;"</span></div><div class="line"></div><div class="line">    <span class="comment">// replacer为function时的作用</span></div><div class="line">    <span class="keyword">let</span> json2 = <span class="built_in">JSON</span>.stringify(obj, <span class="function"><span class="keyword">function</span> (<span class="params">key, value</span>) </span>&#123;</div><div class="line">        <span class="keyword">if</span> (key !== <span class="string">"a"</span>)</div><div class="line">            <span class="keyword">return</span> value;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(json2); <span class="comment">// "&#123;"b":"22","c":[1,2,3]&#125;"</span></div><div class="line"></div><div class="line">    <span class="comment">// 第三个参数space，还可以调缩进，自动进行格式化，还可以是填充字符串</span></div><div class="line">    <span class="keyword">let</span> json3 = <span class="built_in">JSON</span>.stringify(obj, <span class="literal">null</span>, <span class="number">4</span>);</div><div class="line">    <span class="built_in">console</span>.log(json3);</div><div class="line">    <span class="comment">// &#123;</span></div><div class="line">    <span class="comment">//    "a": 2,</span></div><div class="line">    <span class="comment">//    "b": "22",</span></div><div class="line">    <span class="comment">//    "c": [</span></div><div class="line">    <span class="comment">//        1,</span></div><div class="line">    <span class="comment">//        2,</span></div><div class="line">    <span class="comment">//        3</span></div><div class="line">    <span class="comment">//    ]</span></div><div class="line">    <span class="comment">// &#125;</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 以下布尔假植在强制转换的时候结果都为false，强制转换是!! */</span></div><div class="line">    <span class="comment">// undefined, null, fasle, +0, -0, NaN, ""</span></div><div class="line">    <span class="built_in">console</span>.log(!!<span class="literal">undefined</span> || !!<span class="literal">null</span> || !!<span class="literal">false</span> || !!<span class="number">0</span> || !!<span class="literal">NaN</span> || !!<span class="string">""</span>); <span class="comment">// false</span></div><div class="line">    <span class="comment">// document.all在某些IE和某些浏览器是为真值，在某些浏览器下为假值，是一个类数组</span></div><div class="line"></div><div class="line">    <span class="comment">/* 假值之外都是真值，转换后都为true */</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 显式强制类型转换 */</span></div><div class="line">    <span class="comment">// 字符串和数字之间的显式转换，不要使用new，并不是创建对象</span></div><div class="line">    <span class="keyword">let</span> a = <span class="number">22</span>;</div><div class="line">    <span class="keyword">let</span> b = <span class="string">"3.14"</span>;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> c = <span class="built_in">String</span>(a);</div><div class="line">    <span class="keyword">let</span> d = <span class="built_in">Number</span>(b);</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(c, d); <span class="comment">// "22", 3.14</span></div><div class="line"></div><div class="line">    <span class="comment">// 另一种方法的显式转换</span></div><div class="line">    <span class="keyword">let</span> e = a.toString(); <span class="comment">// 调用的是Number.prototype.toString</span></div><div class="line">    <span class="keyword">let</span> f = +b;</div><div class="line">    <span class="built_in">console</span>.log(e, f); <span class="comment">// "22", 3.14</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 日期显示转换为数字（相当于.getTime()功能）</span></div><div class="line">    <span class="keyword">let</span> a = <span class="keyword">new</span> <span class="built_in">Date</span>();</div><div class="line">    <span class="built_in">console</span>.log(+a, a.getTime());</div><div class="line"></div><div class="line">    <span class="comment">// 当实例化一个构造函数的时候如果没有参数传入，可以不加()</span></div><div class="line">    <span class="built_in">console</span>.log(+<span class="keyword">new</span> <span class="built_in">Date</span>);</div><div class="line"></div><div class="line">    <span class="comment">// ES5的Date有一个获取当前时间戳的API，其polyfill就是+new Date()</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Date</span>.now());</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* parseInt的使用 */</span></div><div class="line"></div><div class="line">    <span class="comment">// Number()针对的是字符串，要求所有字符都是数字，否则返回NaN</span></div><div class="line">    <span class="comment">// parseInt()可以忽略不是数字字符的字符串，遇到非数字字符则停止转换，若第一个不是数字则返回NaN</span></div><div class="line">    <span class="keyword">let</span> a = <span class="string">'12aa45'</span>;</div><div class="line">    <span class="keyword">let</span> b = <span class="string">'456'</span>;</div><div class="line">    <span class="keyword">let</span> c = <span class="string">'aa123456'</span>;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(a), <span class="built_in">Number</span>(a)); <span class="comment">// 12, NaN</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(b), <span class="built_in">Number</span>(b)); <span class="comment">// 12, 456</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(c), <span class="built_in">Number</span>(c)); <span class="comment">// NaN, NaN</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* parseInt的第二个参数转制问题，将当前数值定义为自定义进制，不用加前缀</span></div><div class="line">       然后转换为数字，所有都会被转为十进制 */</div><div class="line"></div><div class="line">    <span class="comment">// 如果需要在ES5之前的环境运行并且没有polyfill，需要手动加上第二个参数10</span></div><div class="line">    <span class="comment">// 强制转换为十进制，不然会被转为八进制，避免不必要的坑</span></div><div class="line"></div><div class="line">    <span class="keyword">let</span> a = <span class="string">"100"</span>;</div><div class="line">    <span class="keyword">let</span> b = <span class="number">256</span>;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(a, <span class="number">16</span>)); <span class="comment">// 256</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(a, <span class="number">8</span>)); <span class="comment">// 64</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(a, <span class="number">2</span>)); <span class="comment">// 4</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">parseInt</span>(a, <span class="number">10</span>)); <span class="comment">// 100</span></div><div class="line"></div><div class="line">    <span class="comment">/* toString()传入参数，可以将当前数值转换为指定进制 */</span></div><div class="line">    <span class="built_in">console</span>.log(b.toString(<span class="number">16</span>)); <span class="comment">// 100</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 自定义转换 */</span></div><div class="line"></div><div class="line">    <span class="comment">// 十进制数值转为自定义进制：</span></div><div class="line">    <span class="keyword">let</span> decimalToOther = <span class="function"><span class="keyword">function</span> (<span class="params">num, transform</span>) </span>&#123;</div><div class="line">        <span class="comment">/* 返回的是字符串，用于展示 */</span></div><div class="line">        <span class="keyword">var</span> num = +num;</div><div class="line">        <span class="keyword">var</span> transform = +transform;</div><div class="line">        <span class="keyword">if</span> (transform === <span class="number">16</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="string">'0x'</span> + num.toString(<span class="number">16</span>);</div><div class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (transform === <span class="number">8</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="string">'0o'</span> + num.toString(<span class="number">8</span>);</div><div class="line">        &#125; <span class="keyword">else</span> &#123;</div><div class="line">            <span class="keyword">return</span> num.toString(transform);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(decimalToOther(<span class="number">100</span>, <span class="number">8</span>)); <span class="comment">// "0o144"</span></div><div class="line"></div><div class="line">    <span class="comment">// 其他转制转换为十进制（传入标准格式0X或0o等字符串格式）：</span></div><div class="line">    <span class="keyword">let</span> otherToDecimal = <span class="function"><span class="keyword">function</span> (<span class="params">num</span>) </span>&#123;</div><div class="line">        <span class="comment">/* 返回数字 */</span></div><div class="line">        <span class="keyword">var</span> num = num.toLowerCase();</div><div class="line">        <span class="keyword">if</span> (num.indexOf(<span class="string">'0x'</span>) === <span class="number">0</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="built_in">parseInt</span>(num.replace(<span class="regexp">/0x/</span>, <span class="string">''</span>), <span class="number">16</span>);</div><div class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (num.indexOf(<span class="string">'0o'</span>) === <span class="number">0</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="built_in">parseInt</span>(num.replace(<span class="regexp">/0o/</span>, <span class="string">''</span>), <span class="number">8</span>);</div><div class="line">        &#125; <span class="keyword">else</span> &#123;</div><div class="line">            <span class="keyword">return</span> <span class="built_in">parseInt</span>(num, <span class="number">10</span>);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(otherToDecimal(<span class="string">'0x100'</span>)); <span class="comment">// 256</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* boolean显示转换，建议使用!!用来转换 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="string">"asd"</span>;</div><div class="line">    <span class="keyword">let</span> b = [];</div><div class="line">    <span class="keyword">let</span> c = &#123;&#125;;</div><div class="line"></div><div class="line">    <span class="comment">// 注意空数组和空对象都是返回true。是真值，所有的假值上面有提到</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Boolean</span>(a)); <span class="comment">// true</span></div><div class="line">    <span class="built_in">console</span>.log(!!b); <span class="comment">// true</span></div><div class="line">    <span class="built_in">console</span>.log(!!c); <span class="comment">//true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> arr = [<span class="number">2</span>, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; &#125;, <span class="number">4</span>, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; &#125;];</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify(arr));</div><div class="line"></div><div class="line">    <span class="keyword">let</span> json = <span class="built_in">JSON</span>.stringify(arr, <span class="function"><span class="keyword">function</span> (<span class="params">key, value</span>) </span>&#123;</div><div class="line">        <span class="keyword">if</span> (<span class="keyword">typeof</span> value === <span class="string">'function'</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="literal">true</span>;</div><div class="line">        &#125; <span class="keyword">else</span> &#123;</div><div class="line">            <span class="keyword">return</span> value</div><div class="line">        &#125;</div><div class="line">    &#125;);</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(json); <span class="comment">// [2,true,4,true]</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* || 或 &amp;&amp; 返回的不一定是布尔值 */</span></div><div class="line"></div><div class="line">    <span class="comment">// 对于||，如果当前值判断为true，就会返回当前值</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="literal">false</span> || <span class="string">"ss"</span> || <span class="number">110</span>); <span class="comment">// "ss"</span></div><div class="line"></div><div class="line">    <span class="comment">// 对于&amp;&amp;，只要有一个值判断为false，就返回判断为false的那个值，</span></div><div class="line">    <span class="comment">// 否则返回最后一个值</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="string">"55"</span> &amp;&amp; <span class="literal">undefined</span> &amp;&amp; <span class="number">110</span>); <span class="comment">// undefined</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="string">"55"</span> &amp;&amp; <span class="literal">null</span> &amp;&amp; <span class="number">110</span>); <span class="comment">// null</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="string">"55"</span> &amp;&amp; <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; &#125; &amp;&amp; <span class="number">110</span>); <span class="comment">// 110</span></div><div class="line"></div><div class="line">    <span class="comment">// 所以||会有一个常用作用：传参判断</span></div><div class="line">    <span class="keyword">let</span> func = <span class="function"><span class="keyword">function</span> (<span class="params">a, b</span>) </span>&#123;</div><div class="line">        a = a || <span class="string">'Hello'</span>;</div><div class="line">        b = b || <span class="string">'World'</span>;</div><div class="line">        <span class="keyword">return</span> a + <span class="string">" "</span> + b;</div><div class="line">    &#125;</div><div class="line">    <span class="built_in">console</span>.log(func(<span class="string">'Hi'</span>)); <span class="comment">// Hi World</span></div><div class="line">    <span class="built_in">console</span>.log(func(<span class="string">'Hi'</span>, <span class="string">""</span>)); <span class="comment">// 注意这里传入了假值，结果依然是Hi World</span></div><div class="line">    <span class="built_in">console</span>.log(func(<span class="string">'Hi'</span>, <span class="string">" "</span>).trim()); <span class="comment">// 传入空字符则判断为true，返回Hi</span></div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(<span class="keyword">typeof</span> <span class="string">""</span>) <span class="comment">// string，如有需求可以通过这个进行容错</span></div><div class="line"></div><div class="line">    <span class="comment">// 所以&amp;&amp;会有一个常用作用：判断参数是否为true，是则执行一个函数</span></div><div class="line">    <span class="literal">true</span> &amp;&amp; (<span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="built_in">console</span>.log(<span class="string">'this is &amp;&amp; function!'</span>);</div><div class="line">    &#125;)();</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 注意ES6的Symbol只能够通过显式转换为字符串，使用隐式将会报错 */</span></div><div class="line">    <span class="keyword">let</span> symbol = <span class="built_in">Symbol</span>(<span class="string">'symbolElement'</span>);</div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">String</span>(symbol)); <span class="comment">// "Symbol(symbolElement)"</span></div><div class="line"></div><div class="line">    <span class="comment">// symbol + "" 这样隐式转换会报错</span></div><div class="line"></div><div class="line">    <span class="comment">// Symbol无法转换为数字，显示和隐式都会出错</span></div><div class="line"></div><div class="line">    <span class="comment">// Symbol可以转换为boolean，隐式显式都转换为true</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Boolean</span>(symbol)); <span class="comment">// true</span></div><div class="line">    <span class="built_in">console</span>.log(!!symbol); <span class="comment">// true</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 关于==和===的使用准则 */</span></div><div class="line"></div><div class="line">    <span class="comment">// 当两边有值为true和false的时候，前往不要使用==</span></div><div class="line">    <span class="comment">// 当两边有值为[]，""，0时，尽量不要使用==</span></div><div class="line">    <span class="comment">// 使用===是最安全的选择</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* ++表达式 */</span></div><div class="line">    <span class="keyword">let</span> a = <span class="number">43</span>;</div><div class="line">    <span class="keyword">let</span> b = (a++ , a);</div><div class="line">    <span class="built_in">console</span>.log(b); <span class="comment">// 正确将44赋值给b</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* ES6的参数预留值可以理解为使用了let，存在暂时性死区TDZ */</span></div><div class="line">    <span class="comment">// 下面声明赋值b的时候，同时进行了访问，这样在ES6有些情况会报错</span></div><div class="line">    <span class="keyword">let</span> testTDZ = <span class="function"><span class="keyword">function</span> (<span class="params">a = <span class="number">3</span>, b = a + b + <span class="number">3</span></span>) </span>&#123;</div><div class="line">        <span class="built_in">console</span>.log(a, b); <span class="comment">// 不报错就输出NaN</span></div><div class="line">    &#125;</div><div class="line">    <span class="comment">// testTDZ();</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 宿主变量 */</span></div><div class="line">    <span class="keyword">let</span> div = <span class="built_in">document</span>.createElement(<span class="string">'div'</span>);</div><div class="line">    <span class="built_in">console</span>.log(<span class="keyword">typeof</span> div); <span class="comment">// object</span></div><div class="line">    <span class="built_in">console</span>.log(<span class="built_in">Object</span>.prototype.toString.call(div)); <span class="comment">// [object HTMLDivElement]</span></div><div class="line">    <span class="built_in">console</span>.log(div.tagName); <span class="comment">// DIV</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* 由于浏览器历史遗留问题，在创建带有id 属性的DOM 元素时也会创建同名的全局变量 */</span></div><div class="line">    <span class="comment">// &lt;div id="app"&gt;&lt;/div&gt;</span></div><div class="line">    <span class="built_in">console</span>.log(app); <span class="comment">// 一个元素的id为app写在html，window全局对象就带有这个属性</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
