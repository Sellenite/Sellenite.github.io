><div class="line">369</div><div class="line">370</div><div class="line">371</div><div class="line">372</div><div class="line">373</div><div class="line">374</div><div class="line">375</div><div class="line">376</div><div class="line">377</div><div class="line">378</div><div class="line">379</div><div class="line">380</div><div class="line">381</div><div class="line">382</div><div class="line">383</div><div class="line">384</div><div class="line">385</div><div class="line">386</div><div class="line">387</div><div class="line">388</div><div class="line">389</div><div class="line">390</div><div class="line">391</div><div class="line">392</div><div class="line">393</div><div class="line">394</div><div class="line">395</div><div class="line">396</div><div class="line">397</div><div class="line">398</div><div class="line">399</div><div class="line">400</div><div class="line">401</div><div class="line">402</div><div class="line">403</div><div class="line">404</div><div class="line">405</div><div class="line">406</div><div class="line">407</div><div class="line">408</div><div class="line">409</div><div class="line">410</div><div class="line">411</div><div class="line">412</div><div class="line">413</div><div class="line">414</div><div class="line">415</div><div class="line">416</div><div class="line">417</div><div class="line">418</div><div class="line">419</div><div class="line">420</div><div class="line">421</div><div class="line">422</div><div class="line">423</div><div class="line">424</div><div class="line">425</div><div class="line">426</div></pre></td><td class="code"><pre><div class="line"><span class="comment">/**</span></div><div class="line"> * 你不知道的JavaScript(中卷) 第二部分 异步和性能</div><div class="line"> */</div><div class="line"></div><div class="line"><span class="comment">// 模拟promise请求</span></div><div class="line"><span class="keyword">const</span> promiseRequest = <span class="function"><span class="keyword">function</span>(<span class="params">success, delay</span>) </span>&#123;</div><div class="line">    <span class="keyword">return</span> <span class="keyword">new</span> <span class="built_in">Promise</span>(<span class="function">(<span class="params">resolve, reject</span>) =&gt;</span> &#123;</div><div class="line">        setTimeout(<span class="function"><span class="params">()</span> =&gt;</span> &#123;</div><div class="line">            <span class="keyword">if</span> (success) &#123;</div><div class="line">                <span class="keyword">if</span> (<span class="keyword">typeof</span> success === <span class="string">'boolean'</span>) &#123;</div><div class="line">                    resolve(<span class="string">'promise success'</span>);</div><div class="line">                &#125; <span class="keyword">else</span> &#123;</div><div class="line">                    resolve(success);</div><div class="line">                &#125;</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                reject(<span class="string">'promise error'</span>);</div><div class="line">            &#125;</div><div class="line">        &#125;, delay);</div><div class="line">    &#125;);</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="comment">// 支持Promise的Generator Runner</span></div><div class="line"><span class="keyword">const</span> run = <span class="function"><span class="keyword">function</span>(<span class="params">gen</span>) </span>&#123;</div><div class="line">    <span class="keyword">let</span> args = [].slice.call(<span class="built_in">arguments</span>, <span class="number">1</span>), it;</div><div class="line">    <span class="comment">// 在当前上下文中初始化生成器</span></div><div class="line">    it = gen.apply(<span class="keyword">this</span>, args);</div><div class="line">    <span class="comment">// 返回一个promise用于生成器完成</span></div><div class="line">    <span class="keyword">return</span> <span class="built_in">Promise</span>.resolve().then(<span class="function"><span class="keyword">function</span> <span class="title">handleNext</span>(<span class="params">value</span>) </span>&#123;</div><div class="line">        <span class="comment">// 对下一个yield出的值运行</span></div><div class="line">        <span class="keyword">let</span> next = it.next(value);</div><div class="line">        <span class="keyword">return</span> (<span class="function"><span class="keyword">function</span> <span class="title">handleResult</span>(<span class="params">next</span>) </span>&#123;</div><div class="line">            <span class="comment">// 生成器运行完毕了吗？</span></div><div class="line">            <span class="keyword">if</span> (next.done) &#123;</div><div class="line">                <span class="keyword">return</span> next.value;</div><div class="line">            &#125;</div><div class="line">            <span class="comment">// 否则继续运行</span></div><div class="line">            <span class="keyword">else</span> &#123;</div><div class="line">                <span class="keyword">return</span> <span class="built_in">Promise</span>.resolve(next.value).then(</div><div class="line">                    <span class="comment">// 成功就恢复异步循环，把决议的值发回生成器</span></div><div class="line">                    handleNext,</div><div class="line">                    <span class="comment">// 如果value是被拒绝的 promise，</span></div><div class="line">                    <span class="comment">// 就把错误传回生成器进行出错处理</span></div><div class="line">                    <span class="function"><span class="keyword">function</span> <span class="title">handleErr</span>(<span class="params">err</span>) </span>&#123;</div><div class="line">                        <span class="keyword">return</span> <span class="built_in">Promise</span>.resolve(</div><div class="line">                            it.throw(err)</div><div class="line">                        ).then(handleResult);</div><div class="line">                    &#125;</div><div class="line">                );</div><div class="line">            &#125;</div><div class="line">        &#125;)(next);</div><div class="line">    &#125;);</div><div class="line">&#125;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 分时函数，每次计时器处理一段数据，避免一次处理过多数据</span></div><div class="line">    <span class="keyword">const</span> timeChunk = <span class="function"><span class="keyword">function</span>(<span class="params">array = [], fn = (</span>) =&gt; </span>&#123; &#125;, count = <span class="number">1</span>, interval = <span class="number">200</span>) &#123;</div><div class="line">        <span class="keyword">let</span> obj, timer;</div><div class="line"></div><div class="line">        <span class="keyword">const</span> start = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="number">0</span>; i &lt; <span class="built_in">Math</span>.min(count, array.length); i++) &#123;</div><div class="line">                obj = array.shift();</div><div class="line">                fn(obj);</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        <span class="keyword">return</span> <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            timer = setInterval(<span class="function"><span class="params">()</span> =&gt;</span> &#123;</div><div class="line">                <span class="keyword">if</span> (array.length === <span class="number">0</span>) &#123;</div><div class="line">                    <span class="keyword">return</span> clearInterval(timer);</div><div class="line">                &#125;</div><div class="line">                start();</div><div class="line">            &#125;, interval);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> dataArray = [];</div><div class="line">    <span class="keyword">let</span> resultArray = [];</div><div class="line"></div><div class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="number">0</span>; i &lt; <span class="number">10</span>; i++) &#123;</div><div class="line">        dataArray.push(i);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="comment">// 每1秒处理2个item</span></div><div class="line">    <span class="keyword">const</span> timeChunkFn = timeChunk(dataArray, <span class="function"><span class="keyword">function</span>(<span class="params">item</span>) </span>&#123;</div><div class="line">        resultArray.push(item * <span class="number">2</span>);</div><div class="line">    &#125;, <span class="number">2</span>, <span class="number">1000</span>);</div><div class="line"></div><div class="line">    timeChunkFn();</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">try</span> &#123;</div><div class="line">        <span class="comment">// 延时的报错不会被catch到，只有同步的代码或生成器（类似于async）的才能catch到</span></div><div class="line">        setTimeout(<span class="function"><span class="params">()</span> =&gt;</span> &#123;</div><div class="line">            <span class="comment">// throw undefined</span></div><div class="line">        &#125;, <span class="number">100</span>);</div><div class="line">    &#125; <span class="keyword">catch</span> (err) &#123;</div><div class="line">        <span class="comment">// 延时抛错永远不会被catch到，不会执行以下代码</span></div><div class="line">        <span class="built_in">console</span>.log(err);</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// generator</span></div><div class="line">    <span class="keyword">let</span> a = <span class="number">100</span>;</div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        a++;</div><div class="line">        <span class="keyword">yield</span>; <span class="comment">// 暂停</span></div><div class="line">        <span class="keyword">return</span> a;</div><div class="line">    &#125;</div><div class="line">    <span class="keyword">let</span> iterator = foo();</div><div class="line"></div><div class="line">    iterator.next();</div><div class="line">    <span class="keyword">let</span> res = iterator.next();</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(res); <span class="comment">// value, done</span></div><div class="line"></div><div class="line">    <span class="keyword">const</span> bar = <span class="function"><span class="keyword">function</span>* (<span class="params">num</span>) </span>&#123;</div><div class="line">        <span class="comment">// 遇到yield表达式时，会暂停在赋值语句中间，并本质要求提供一个值</span></div><div class="line">        <span class="comment">// 可以不设定预留值，即(yield)，不设定时默认返回的value是undefined</span></div><div class="line">        <span class="keyword">let</span> result = num * (<span class="keyword">yield</span> <span class="string">'Hello'</span>);</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> iterator2 = bar(<span class="number">10</span>);</div><div class="line">    <span class="keyword">let</span> res21 = iterator2.next(); <span class="comment">// 函数停在yield表达式的中间，并把yield后的内容暂时作为value值</span></div><div class="line">    <span class="keyword">let</span> res22 = iterator2.next(<span class="number">7</span>); <span class="comment">// 传值，赋值语句继续执行</span></div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(res21, res22); <span class="comment">// value: Hello, value: 70</span></div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 仿标准迭代器iterator接口的写法</span></div><div class="line">    <span class="keyword">const</span> iterator = (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> nextval;</div><div class="line"></div><div class="line">        <span class="keyword">return</span> &#123;</div><div class="line">            <span class="comment">// for..of循环需要</span></div><div class="line">            [<span class="built_in">Symbol</span>.iterator]: <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">                <span class="keyword">return</span> <span class="keyword">this</span>;</div><div class="line">            &#125;,</div><div class="line">            <span class="attr">next</span>: <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">                <span class="keyword">if</span> (nextval === <span class="literal">undefined</span>) &#123;</div><div class="line">                    nextval = <span class="number">1</span>;</div><div class="line">                &#125; <span class="keyword">else</span> &#123;</div><div class="line">                    nextval = (<span class="number">3</span> * nextval) + <span class="number">6</span></div><div class="line">                &#125;</div><div class="line"></div><div class="line">                <span class="keyword">return</span> &#123;</div><div class="line">                    <span class="attr">done</span>: <span class="literal">false</span>,</div><div class="line">                    <span class="attr">value</span>: nextval</div><div class="line">                &#125;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">    &#125;)();</div><div class="line"></div><div class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> v <span class="keyword">of</span> iterator) &#123;</div><div class="line">        <span class="built_in">console</span>.log(v);</div><div class="line"></div><div class="line">        <span class="keyword">if</span> (v &gt; <span class="number">500</span>) &#123;</div><div class="line">            <span class="keyword">break</span>;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 使用标准生成器generator，执行后就成为iterator</span></div><div class="line">    <span class="comment">// iterator有next，throw和return这三个方法</span></div><div class="line">    <span class="keyword">const</span> generator = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            <span class="keyword">let</span> nextval;</div><div class="line"></div><div class="line">            <span class="keyword">while</span> (<span class="literal">true</span>) &#123;</div><div class="line">                <span class="keyword">if</span> (nextval === <span class="literal">undefined</span>) &#123;</div><div class="line">                    nextval = <span class="number">1</span>;</div><div class="line">                &#125; <span class="keyword">else</span> &#123;</div><div class="line">                    nextval = (<span class="number">3</span> * nextval) + <span class="number">6</span>;</div><div class="line">                &#125;</div><div class="line"></div><div class="line">                <span class="keyword">yield</span> nextval;</div><div class="line">            &#125;</div><div class="line">        &#125; <span class="keyword">finally</span> &#123;</div><div class="line">            <span class="built_in">console</span>.log(<span class="string">'Clean up'</span>);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> v <span class="keyword">of</span> generator()) &#123;</div><div class="line">        <span class="built_in">console</span>.log(v);</div><div class="line"></div><div class="line">        <span class="keyword">if</span> (v &gt; <span class="number">500</span>) &#123;</div><div class="line">            <span class="keyword">break</span>;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 异步迭代生成器普通版</span></div><div class="line">    <span class="keyword">const</span> callbackRequest = <span class="function"><span class="keyword">function</span>(<span class="params">success, delay</span>) </span>&#123;</div><div class="line">        setTimeout(<span class="function"><span class="params">()</span> =&gt;</span> &#123;</div><div class="line">            <span class="comment">// 请求前会阻断同步代码，请求后才决定iterator的返回</span></div><div class="line">            <span class="keyword">if</span> (success) &#123;</div><div class="line">                it.next(<span class="string">'callback success'</span>);</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                it.throw(<span class="string">'callback error'</span>);</div><div class="line">            &#125;</div><div class="line">        &#125;, delay);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="comment">// 看起来很像async-await</span></div><div class="line">    <span class="keyword">const</span> main = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="comment">// try-catch本来是无法捕获异步错误的，这里是属于同步代码，迭代器暂停</span></div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            <span class="keyword">let</span> result = <span class="keyword">yield</span> callbackRequest(<span class="literal">true</span>, <span class="number">1000</span>);</div><div class="line">            <span class="built_in">console</span>.log(result);</div><div class="line">        &#125; <span class="keyword">catch</span> (err) &#123;</div><div class="line">            <span class="built_in">console</span>.log(err);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> it = main();</div><div class="line">    it.next();</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 异步迭代生成器配合Promise版</span></div><div class="line">    <span class="keyword">const</span> main = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            <span class="keyword">let</span> result = <span class="keyword">yield</span> promiseRequest(<span class="literal">true</span>, <span class="number">2000</span>);</div><div class="line">            <span class="built_in">console</span>.log(result);</div><div class="line">        &#125; <span class="keyword">catch</span> (err) &#123;</div><div class="line">            <span class="built_in">console</span>.log(err);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> it = main();</div><div class="line">    <span class="comment">// 此时value的值是一个request里返回的promise</span></div><div class="line">    <span class="keyword">const</span> promise = it.next().value;</div><div class="line"></div><div class="line">    promise.then(<span class="function"><span class="params">res</span> =&gt;</span> &#123;</div><div class="line">        it.next(res);</div><div class="line">    &#125;, err =&gt; &#123;</div><div class="line">        it.throw(err);</div><div class="line">    &#125;);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// yield的同步和并行操作比较，根据上个迭代配合promise使用Generator Runner函数</span></div><div class="line">    <span class="keyword">const</span> mainStep = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="comment">// 都是同步代码，p3是在6秒后才打印出来</span></div><div class="line">        <span class="keyword">let</span> p1 = <span class="keyword">yield</span> promiseRequest(<span class="literal">true</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> p2 = <span class="keyword">yield</span> promiseRequest(<span class="literal">true</span>, <span class="number">2000</span>);</div><div class="line">        <span class="keyword">let</span> p3 = <span class="keyword">yield</span> promiseRequest(<span class="literal">true</span>, <span class="number">3000</span>);</div><div class="line"></div><div class="line">        <span class="built_in">console</span>.log(p3);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    run(mainStep);</div><div class="line"></div><div class="line">    <span class="comment">// 生成器的Promise并发</span></div><div class="line">    <span class="keyword">const</span> mainAll = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="comment">// 这样写的p1和p2是并行的，首先都进行请求，然后再进行yield，所用时间是2s+3s</span></div><div class="line">        <span class="keyword">let</span> p1 = promiseRequest(<span class="string">'p1 yield'</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> p2 = promiseRequest(<span class="string">'p2 yield'</span>, <span class="number">2000</span>);</div><div class="line"></div><div class="line">        <span class="comment">// 并行开始，并且两者都完成了才会继续执行p3</span></div><div class="line">        <span class="keyword">let</span> r1 = <span class="keyword">yield</span> p1;</div><div class="line">        <span class="keyword">let</span> r2 = <span class="keyword">yield</span> p2;</div><div class="line"></div><div class="line">        <span class="keyword">let</span> p3 = <span class="keyword">yield</span> promiseRequest(<span class="string">`<span class="subst">$&#123;r1&#125;</span> and <span class="subst">$&#123;r2&#125;</span>`</span>, <span class="number">3000</span>);</div><div class="line">        <span class="built_in">console</span>.log(p3);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    run(mainAll);</div><div class="line"></div><div class="line">    <span class="comment">// 当然也可以使用PromiseAll处理并发，换个方式</span></div><div class="line">    <span class="keyword">const</span> mainPromiseAll = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> p1 = promiseRequest(<span class="string">'p1 promiseAll yield'</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> p2 = promiseRequest(<span class="string">'p2 promiseAll yield '</span>, <span class="number">2000</span>);</div><div class="line"></div><div class="line">        <span class="keyword">let</span> results = <span class="keyword">yield</span> <span class="built_in">Promise</span>.all([p1, p2]);</div><div class="line"></div><div class="line">        <span class="keyword">let</span> [r1, r2] = results;</div><div class="line"></div><div class="line">        <span class="keyword">let</span> p3 = <span class="keyword">yield</span> promiseRequest(<span class="string">`<span class="subst">$&#123;r1&#125;</span> and <span class="subst">$&#123;r2&#125;</span>`</span>, <span class="number">3000</span>);</div><div class="line">        <span class="built_in">console</span>.log(p3);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    run(mainPromiseAll);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 使用现有的Async-Await进行上面的操作</span></div><div class="line">    <span class="keyword">const</span> mainStep = <span class="keyword">async</span> <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="comment">// 都是同步代码，p3是在6秒后才打印出来</span></div><div class="line">        <span class="keyword">let</span> p1 = <span class="keyword">await</span> promiseRequest(<span class="literal">true</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> p2 = <span class="keyword">await</span> promiseRequest(<span class="literal">true</span>, <span class="number">2000</span>);</div><div class="line">        <span class="keyword">let</span> p3 = <span class="keyword">await</span> promiseRequest(<span class="literal">true</span>, <span class="number">3000</span>);</div><div class="line"></div><div class="line">        <span class="built_in">console</span>.log(p3);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    mainStep();</div><div class="line"></div><div class="line">    <span class="keyword">const</span> mainAll = <span class="keyword">async</span> <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="comment">// 这样写的p1和p2是并行的，首先都进行请求，然后再进行await，所用时间是2s+3s</span></div><div class="line">        <span class="keyword">let</span> p1 = promiseRequest(<span class="string">'p1 await'</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> p2 = promiseRequest(<span class="string">'p2 await'</span>, <span class="number">2000</span>);</div><div class="line"></div><div class="line">        <span class="comment">// 并行开始，并且两者都完成了才会继续执行p3</span></div><div class="line">        <span class="keyword">let</span> r1 = <span class="keyword">await</span> p1;</div><div class="line">        <span class="keyword">let</span> r2 = <span class="keyword">await</span> p2;</div><div class="line"></div><div class="line">        <span class="keyword">let</span> p3 = <span class="keyword">await</span> promiseRequest(<span class="string">`<span class="subst">$&#123;r1&#125;</span> and <span class="subst">$&#123;r2&#125;</span>`</span>, <span class="number">3000</span>);</div><div class="line">        <span class="built_in">console</span>.log(p3);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    mainAll();</div><div class="line"></div><div class="line">    <span class="comment">// 当然也可以使用PromiseAll处理并发，换个方式</span></div><div class="line">    <span class="keyword">const</span> mainPromiseAll = <span class="keyword">async</span> <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> p1 = promiseRequest(<span class="string">'p1 promiseAll await'</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> p2 = promiseRequest(<span class="string">'p2 promiseAll await '</span>, <span class="number">2000</span>);</div><div class="line"></div><div class="line">        <span class="keyword">let</span> results = <span class="keyword">await</span> <span class="built_in">Promise</span>.all([p1, p2]);</div><div class="line"></div><div class="line">        <span class="keyword">let</span> [r1, r2] = results;</div><div class="line"></div><div class="line">        <span class="keyword">let</span> p3 = <span class="keyword">await</span> promiseRequest(<span class="string">`<span class="subst">$&#123;r1&#125;</span> and <span class="subst">$&#123;r2&#125;</span>`</span>, <span class="number">3000</span>);</div><div class="line">        <span class="built_in">console</span>.log(p3);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    mainPromiseAll();</div><div class="line"></div><div class="line">    <span class="comment">/**</span></div><div class="line">     * 这里注意，如果再使用Promise.all时，里面所有的promise进行了返回了catch，那么在Promise.all</div><div class="line">     * 里就就算报错了，也会走all的then，而不会走catch，如果想分别报错捕获，就在每个promise里进行</div><div class="line">     * catch处理并return出去，如果想只有一个报错就执行all的catch，就不要在里面写catch，注意</div><div class="line">     * */</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 生成器调用另一个生成器，依旧依赖Generator Runner</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> r1 = <span class="keyword">yield</span> promiseRequest(<span class="string">'p1 another'</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> r2 = <span class="keyword">yield</span> promiseRequest(<span class="string">`<span class="subst">$&#123;r1&#125;</span> and p2 another`</span>, <span class="number">2000</span>);</div><div class="line"></div><div class="line">        <span class="keyword">return</span> r2;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> bar = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> r3 = <span class="keyword">yield</span> promiseRequest(<span class="string">'p3'</span>, <span class="number">100</span>);</div><div class="line">        <span class="keyword">let</span> r2 = <span class="keyword">yield</span> run(foo);</div><div class="line"></div><div class="line">        <span class="built_in">console</span>.log(r2);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    run(bar);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">// 生成器调用另一个生成器，但使用yield委托，异步委托</span></div><div class="line">    <span class="keyword">const</span> foo = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> r1 = <span class="keyword">yield</span> promiseRequest(<span class="string">'p1 another'</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">let</span> r2 = <span class="keyword">yield</span> promiseRequest(<span class="string">`<span class="subst">$&#123;r1&#125;</span> and p2 another 委托版`</span>, <span class="number">2000</span>);</div><div class="line"></div><div class="line">        <span class="keyword">return</span> r2;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> bar = <span class="function"><span class="keyword">function</span>* (<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">let</span> r3 = <span class="keyword">yield</span> promiseRequest(<span class="string">'p3'</span>, <span class="number">100</span>);</div><div class="line">        <span class="comment">// 注意这里，使用的是yield*</span></div><div class="line">        <span class="keyword">let</span> r2 = <span class="keyword">yield</span>* foo();</div><div class="line"></div><div class="line">        <span class="built_in">console</span>.log(r2);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    run(bar);</div><div class="line">&#125;;</div><div class="line"></div><div class="line"><span class="comment">// await的Promise.all的错误捕获之一，统一在Promise.all中的catch捕获</span></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> doRequest1 = <span class="keyword">async</span> () =&gt; &#123;</div><div class="line">        <span class="keyword">let</span> res = <span class="keyword">await</span> promiseRequest(<span class="literal">false</span>, <span class="number">1000</span>);</div><div class="line">        <span class="keyword">return</span> res;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> doRequest2 = <span class="keyword">async</span> () =&gt; &#123;</div><div class="line">        <span class="keyword">let</span> res = <span class="keyword">await</span> promiseRequest(<span class="string">'await try-catch-2'</span>, <span class="number">2000</span>);</div><div class="line">        <span class="keyword">return</span> res;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="comment">// doRequest1报错后接下来的请求都不会再执行，错误提示只提一遍</span></div><div class="line">    <span class="built_in">Promise</span>.all([doRequest1(), doRequest2()]).then(<span class="function"><span class="params">res</span> =&gt;</span> &#123;</div><div class="line">        <span class="built_in">console</span>.log(res);</div><div class="line">    &#125;).catch(<span class="function"><span class="params">err</span> =&gt;</span> &#123;</div><div class="line">        <span class="built_in">console</span>.log(err);</div><div class="line">    &#125;);</div><div class="line">&#125;;</div><div class="line"></div><div class="line"><span class="comment">// await的Promise.all的错误捕获之二，分别在里面的Promise都进行try-catch处理，Promise.all里的catch就不会再执行</span></div><div class="line">&#123;</div><div class="line">    <span class="keyword">const</span> doRequest1 = <span class="keyword">async</span> () =&gt; &#123;</div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            <span class="keyword">let</span> res = <span class="keyword">await</span> promiseRequest(<span class="literal">false</span>, <span class="number">1000</span>);</div><div class="line">            <span class="keyword">return</span> res;</div><div class="line">        &#125; <span class="keyword">catch</span> (err) &#123;</div><div class="line">            <span class="built_in">console</span>.log(err);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">const</span> doRequest2 = <span class="keyword">async</span> () =&gt; &#123;</div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            <span class="keyword">let</span> res = <span class="keyword">await</span> promiseRequest(<span class="string">'await try-catch-2'</span>, <span class="number">2000</span>);</div><div class="line">            <span class="keyword">return</span> res;</div><div class="line">        &#125; <span class="keyword">catch</span> (err) &#123;</div><div class="line">            <span class="built_in">console</span>.log(err);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="comment">// doRequest1报错后接下来的请求也会继续执行，有多少个错误就报多少个错，只要里面每个Promise都进行了错误捕获，然后只会执行then，永远不会执行catch，因为已经捕获过了</span></div><div class="line">    <span class="built_in">Promise</span>.all([doRequest1(), doRequest2()]).then(<span class="function"><span class="params">res</span> =&gt;</span> &#123;</div><div class="line">        <span class="built_in">console</span>.log(res);</div><div class="line">    &#125;).catch(<span class="function"><span class="params">err</span> =&gt;</span> &#123;</div><div class="line">        <span class="built_in">console</span>.log(<span class="string">'do not run here forever'</span>);</div><div class="line">    &#125;);</div><div class="line">&#125;;</div></pre></td></tr></table></figure>
