">516</div><div class="line">517</div><div class="line">518</div><div class="line">519</div><div class="line">520</div><div class="line">521</div><div class="line">522</div><div class="line">523</div><div class="line">524</div><div class="line">525</div></pre></td><td class="code"><pre><div class="line"><span class="comment">/**</span></div><div class="line"> * 你不知道的JavaScript(上卷) 第二部分 this和对象原型</div><div class="line"> */</div><div class="line">&#123;</div><div class="line">    (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="keyword">var</span> a = <span class="string">'ALL'</span>;</div><div class="line">        <span class="comment">/* arguments.callee可以用来引用正在运行的函数，包括匿名函数 */</span></div><div class="line">        setTimeout(<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="comment">// 该方法是一种被废弃的方案，严格模式下会报错 console.log(arguments.callee);</span></div><div class="line">        &#125;, <span class="number">300</span>);</div><div class="line"></div><div class="line">        <span class="comment">/* 在函数普通模式下直接调用默认绑定的this为全局对象window */</span></div><div class="line">        (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="comment">// 在严格模式下则不会默认绑定，this为undefined use strict一定要写在第一行</span></div><div class="line"><span class="meta">            'use strict'</span>;</div><div class="line"></div><div class="line">            <span class="function"><span class="keyword">function</span> <span class="title">foo</span>(<span class="params"></span>) </span>&#123;</div><div class="line">                <span class="built_in">console</span>.log(<span class="keyword">this</span>); <span class="comment">// undefined</span></div><div class="line">            &#125;</div><div class="line">            foo();</div><div class="line">        &#125;)();</div><div class="line"></div><div class="line">        <span class="comment">/* 函数定义在非严格模式下，即使在严格模式下调用依然被默认绑定为window */</span></div><div class="line">        <span class="function"><span class="keyword">function</span> <span class="title">foo</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="built_in">console</span>.log(<span class="keyword">this</span>);</div><div class="line">        &#125;;</div><div class="line"></div><div class="line">        (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line"><span class="meta">            'use strict'</span>;</div><div class="line">            foo(); <span class="comment">// window</span></div><div class="line">        &#125;)();</div><div class="line"></div><div class="line">        <span class="comment">/* 隐式绑定例子 */</span></div><div class="line">        (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="function"><span class="keyword">function</span> <span class="title">foo</span>(<span class="params"></span>) </span>&#123;</div><div class="line">                <span class="built_in">console</span>.log(<span class="keyword">this</span>.a);</div><div class="line">            &#125;;</div><div class="line"></div><div class="line">            <span class="keyword">var</span> obj = &#123;</div><div class="line">                <span class="attr">a</span>: <span class="number">233</span>,</div><div class="line">                <span class="attr">foo</span>: foo</div><div class="line">            &#125;;</div><div class="line"></div><div class="line">            obj.foo() <span class="comment">// 2</span></div><div class="line">        &#125;)();</div><div class="line"></div><div class="line">        <span class="comment">/**</span></div><div class="line">         * 把基本数据类型转换为对应的引用类型的操作称为装箱，把引用类型转换为基本的数据类型称为拆箱</div><div class="line">         * 装箱的最大作用是将值作为对象来处理</div><div class="line">         */</div><div class="line">        (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            <span class="comment">// 简易装箱</span></div><div class="line">            <span class="function"><span class="keyword">function</span> <span class="title">foo</span>(<span class="params"></span>) </span>&#123;</div><div class="line">                <span class="keyword">return</span> <span class="keyword">this</span>;</div><div class="line">            &#125;;</div><div class="line">            foo.call(<span class="literal">true</span>); <span class="comment">// Boolean &#123;[[PrimitiveValue]]: true&#125;</span></div><div class="line">            foo.call(<span class="string">'123'</span>); <span class="comment">// String &#123;[[PrimitiveValue]]: "123"&#125;</span></div><div class="line">            <span class="keyword">let</span> num = foo.call(<span class="number">456</span>); <span class="comment">// Number &#123;[[PrimitiveValue]]: 456&#125;</span></div><div class="line"></div><div class="line">            <span class="comment">// 简易拆箱</span></div><div class="line">            num.valueOf();</div><div class="line">        &#125;)();</div><div class="line"></div><div class="line">        &#123;</div><div class="line">            <span class="keyword">let</span> foo = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">                <span class="built_in">console</span>.log(<span class="keyword">this</span>);</div><div class="line">            &#125;;</div><div class="line"></div><div class="line">            <span class="keyword">let</span> abc = foo.bind(<span class="literal">null</span>);</div><div class="line">            <span class="comment">/* 严格模式下，this /span>) =&gt;</span> &#123;</div><div class="line">                    <span class="comment">// this继承自foo</span></div><div class="line">                    <span class="built_in">console</span>.log(<span class="keyword">this</span>.a);</div><div class="line">                &#125;</div><div class="line">            &#125;</div><div class="line"></div><div class="line">            <span class="keyword">var</span> obj1 = &#123;</div><div class="line">                <span class="attr">a</span>: <span class="number">2</span></div><div class="line">            &#125;</div><div class="line"></div><div class="line">            <span class="keyword">var</span> obj2 = &#123;</div><div class="line">                <span class="attr">a</span>: <span class="number">4</span></div><div class="line">            &#125;</div><div class="line"></div><div class="line">            <span class="keyword">var</span> bar = foo.call(obj1);</div><div class="line">            bar.call(obj2); <span class="comment">// 2，这里的call由于使用了箭头强制绑定了上下文，一直是obj1</span></div><div class="line">        &#125;)();</div><div class="line"></div><div class="line">        <span class="comment">/* forEach的第二个参数可以绑定上下文，和bind效果一样 */</span></div><div class="line">        (<span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">            [<span class="number">1</span>, <span class="number">3</span>, <span class="number">4</span>].forEach(<span class="function"><span class="keyword">function</span>(<span class="params">item, index</span>) </span>&#123;</div><div class="line">                <span class="built_in">console</span>.log(item, <span class="keyword">this</span>.name);</div><div class="line">            &#125;, &#123; <span class="attr">name</span>: <span class="string">'yuuhei'</span> &#125;);</div><div class="line">        &#125;)();</div><div class="line">    &#125;)();</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> arr = [</div><div class="line">        <span class="number">23</span>,</div><div class="line">        <span class="number">1</span>,</div><div class="line">        <span class="number">6</span>,</div><div class="line">        <span class="number">78</span>,</div><div class="line">        <span class="number">9</span>,</div><div class="line">        <span class="number">22</span>,</div><div class="line">        <span class="number">3</span>,</div><div class="line">        <span class="number">100</span></div><div class="line">    ];</div><div class="line">    <span class="keyword">let</span> ret = [];</div><div class="line">    arr.every(<span class="function">(<span class="params">item</span>) =&gt;</span> &#123;</div><div class="line">        ret.push(item);</div><div class="line">        <span class="comment">/* 遍历每一个元素，直至返回false */</span></div><div class="line">        <span class="keyword">return</span> item % <span class="number">11</span> !== <span class="number">0</span>;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(ret);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> arr = [</div><div class="line">        <span class="number">23</span>,</div><div class="line">        <span class="number">1</span>,</div><div class="line">        <span class="number">6</span>,</div><div class="line">        <span class="number">78</span>,</div><div class="line">        <span class="number">9</span>,</div><div class="line">        <span class="number">22</span>,</div><div class="line">        <span class="number">3</span>,</div><div class="line">        <span class="number">100</span></div><div class="line">    ];</div><div class="line">    <span class="keyword">let</span> ret = [];</div><div class="line">    arr.some(<span class="function">(<span class="params">item</span>) =&gt;</span> &#123;</div><div class="line">        ret.push(item);</div><div class="line">        <span class="comment">/* 遍历每一个元素，直至返回true */</span></div><div class="line">        <span class="keyword">return</span> item % <span class="number">9</span> === <span class="number">0</span>;</div><div class="line">    &#125;);</div><div class="line">    <span class="built_in">console</span>.log(ret);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> arr = [<span class="number">2</span>, <span class="number">4</span>, <span class="number">6</span>];</div><div class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> i <span class="keyword">of</span> arr) &#123;</div><div class="line">        <span class="built_in">console</span>.log(i);</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line"><span class="comment">/* 数组自带迭代器，可以使用for-of遍历数组的值 */</span></div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> arr = [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>];</div><div class="line">    <span class="keyword">let</span> it = arr[<span class="built_in">Symbol</span>.iterator]();</div><div class="line">    <span class="built_in">console</span>.log(it.next());</div><div class="line">&#125;;</div><div class="line"></div><div class="line"><span class="comment">/* 对象本身没有迭代器，需要模仿后才能使用for-of */</span></div><div class="line"></div><div class="line"><span class="comment">/* 由于迭代器的属性就是Symbol.iterator，需要使用键值访问法 */</span></div><div class="line">&#123;</div><div class="line">    <span class="keyword">let</span> obj = &#123;</div><div class="line">        <span class="attr">name</span>: <span class="string">'yuuhei'</span>,</div><div class="line">        <span class="attr">age</s mber">50</span>;</div><div class="line">            <span class="keyword">this</span>.message = <span class="string">`The <span class="subst">$&#123;<span class="keyword">this</span>.name&#125;</span> `</span>;</div><div class="line">        &#125;</div><div class="line">        getMessage() &#123;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">this</span>.message;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">ENIGMA</span> <span class="keyword">extends</span> <span class="title">Orbment</span> </span>&#123;</div><div class="line">        <span class="keyword">constructor</span>(name, width, height) &#123;</div><div class="line">            <span class="comment">// super()在constructor必须在this调用前执行</span></div><div class="line">            <span class="keyword">super</span>(name);</div><div class="line">            <span class="keyword">this</span>.width = width || <span class="number">50</span>;</div><div class="line">            <span class="keyword">this</span>.height = height || <span class="number">50</span>;</div><div class="line">        &#125;</div><div class="line">        setSize(width, height) &#123;</div><div class="line">            <span class="comment">// 以前的伪多态写法：Orbment.prototype.setSize.apply(this, [width, height])</span></div><div class="line">            <span class="comment">// 注意出版书上的super(width, height)在constructor外使用已被禁止，改为替换以下方式实现相对多态</span></div><div class="line">            <span class="keyword">super</span>.setSize(width, height);</div><div class="line">            <span class="keyword">this</span>.message += <span class="string">`size is width <span class="subst">$&#123;<span class="keyword">this</span>.width&#125;</span> and height <span class="subst">$&#123;<span class="keyword">this</span>.height&#125;</span>`</span>;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">this</span>;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">ARCUS</span> <span class="keyword">extends</span> <span class="title">Orbment</span> </span>&#123;</div><div class="line">        <span class="keyword">constructor</span>(name, width, height) &#123;</div><div class="line">            <span class="comment">// super()在constructor必须在this调用前执行</span></div><div class="line">            <span class="keyword">super</span>(name);</div><div class="line">            <span class="keyword">this</span>.width = width || <span class="number">50</span>;</div><div class="line">            <span class="keyword">this</span>.height = height || <span class="number">50</span>;</div><div class="line">        &#125;</div><div class="line">        setSize(width, height) &#123;</div><div class="line">            <span class="comment">// 以前的伪多态写法：Orbment.prototype.setSize.apply(this, [width, height])</span></div><div class="line">            <span class="comment">// 注意出版书上的super(width, height)在constructor外使用已被禁止，改为替换以下方式实现相对多态</span></div><div class="line">            <span class="keyword">super</span>.setSize(width, height);</div><div class="line">            <span class="keyword">this</span>.message += <span class="string">`size is width <span class="subst">$&#123;<span class="keyword">this</span>.width&#125;</span> and height <span class="subst">$&#123;<span class="keyword">this</span>.height&#125;</span>`</span>;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">this</span>;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> ENIGMA_I = <span class="keyword">new</span> ENIGMA(<span class="string">'ENIGMA_I'</span>);</div><div class="line">    <span class="keyword">let</span> ENIGMA_I_SIZE_MESSAGE = ENIGMA_I.setSize().getMessage();</div><div class="line"></div><div class="line">    <span class="keyword">let</span> ARCUS_I = <span class="keyword">new</span> ARCUS(<span class="string">'ARCUS_I'</span>);</div><div class="line">    <span class="keyword">let</span> ARCUS_I_SIZE_MESSAGE = ARCUS_I.setSize(<span class="number">100</span>, <span class="number">70</span>).getMessage();</div><div class="line"></div><div class="line">    <span class="built_in">console</span>.log(ENIGMA_I_SIZE_MESSAGE);</div><div class="line">    <span class="built_in">console</span>.log(ARCUS_I_SIZE_MESSAGE);</div><div class="line">&#125;;</div><div class="line"></div><div class="line">&#123;</div><div class="line">    <span class="comment">/* class并不是静态，只是一个prototype的语法糖，使用prototype仍可修改 */</span></div><div class="line">    <span class="class"><span class="keyword">class</span> <span class="title">Random</span> </span>&#123;</div><div class="line">        <span class="keyword">constructor</span>() &#123;</div><div class="line">            <span class="keyword">this</span>.num = <span class="built_in">Math</span>.random();</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        rand() &#123;</div><div class="line">            <span class="built_in">console</span>.log(<span class="keyword">this</span>.num);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> r1 = <span class="keyword">new</span> Random();</div><div class="line">    r1.rand();</div><div class="line"></div><div class="line">    Random.prototype.rand = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="built_in">console</span>.log(<span class="keyword">this</span>.num * <span class="number">1000</span>);</div><div class="line">    &#125;;</div><div class="line"></div><div class="line">    <span class="keyword">let</span> r2 = <span class="keyword">new</span> Random();</div><div class="line">    r2.rand();</div><div class="line">&#125;;</div></pre></td></tr></table></figure>
