        <h1 id="JS计算时间相减"><a href="#JS计算时间相减" class="headerlink" title="JS计算时间相减"></a>JS计算时间相减</h1><p>项目有时需要前台自己对时间进行相减和格式化，这里写一个，import就可以用<br><a id="more"></a><br><figure class="highlight javascript"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">const</span> timeleft = <span class="function"><span class="keyword">function</span> (<span class="params">endtime, startTime</span>) </span>&#123;</div><div class="line">    <span class="keyword">var</span> date = endtime - startTime;</div><div class="line">    <span class="comment">// 计算出相差天数</span></div><div class="line">    <span class="keyword">var</span> days = <span class="built_in">Math</span>.floor(date / (<span class="number">24</span> * <span class="number">3600</span> * <span class="number">1000</span>));</div><div class="line">    <span class="comment">// 计算天数后剩余的毫秒数</span></div><div class="line">    <span class="keyword">var</span> leave1 = date % (<span class="number">24</span> * <span class="number">3600</span> * <span class="number">1000</span>);</div><div class="line">    <span class="keyword">var</span> hours = <span class="built_in">Math</span>.floor(leave1 / (<span class="number">3600</span> * <span class="number">1000</span>));</div><div class="line">    hours = hours &lt; <span class="number">10</span> ? <span class="string">'0'</span> + hours : hours;</div><div class="line">    <span class="comment">// 计算小时数后剩余的毫秒数</span></div><div class="line">    <span class="keyword">var</span> leave2 = leave1 % (<span class="number">3600</span> * <span class="number">1000</span>);</div><div class="line">    <span class="keyword">var</span> minutes = <span class="built_in">Math</span>.floor(leave2 / (<span class="number">60</span> * <span class="number">1000</span>));</div><div class="line">    minutes = minutes &lt; <span class="number">10</span> ? <span class="string">'0'</span> + minutes : minutes;</div><div class="line">    <span class="comment">// 计算分钟数后剩余的毫秒数</span></div><div class="line">    <span class="keyword">var</span> leave3 = leave2 % (<span class="number">60</span> * <span class="number">1000</span>);</div><div class="line">    <span class="keyword">var</span> seconds = <span class="built_in">Math</span>.round(leave3 / <span class="number">1000</span>);</div><div class="line">    seconds = seconds &lt; <span class="number">10</span> ? <span class="string">'0'</span> + seconds : seconds;</div><div class="line">    <span class="keyword">var</span> format = <span class="string">`<span class="subst">$&#123;days&#125;</span>天 <span class="subst">$&#123;hours&#125;</span>:<span class="subst">$&#123;minutes&#125;</span>:<span class="subst">$&#123;seconds&#125;</span>`</span>;</div><div class="line">    <span class="keyword">return</span> format;</div><div class="line">&#125;;</div><div class="line"></div><div class="line"><span class="keyword">export</span> &#123; timeleft &#125;;</div></pre></td></tr></table></figure></p>
